<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arkcore - User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --neon-blue: #00f2fe; 
            --card-bg: #0d1630; 
            --neon-red: #ff3131; 
        }
        
        body { 
            background: radial-gradient(circle at center, #0a1128 0%, #000411 100%);
            color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; min-height: 100vh;
            overflow-x: hidden;
        }

        .navbar { 
            background: rgba(13, 22, 48, 0.95); backdrop-filter: blur(10px); 
            border-bottom: 2px solid var(--neon-blue); padding: 10px 15px;
        }

        /* 📱 RESPONSIVE CARD FIX */
        .main-content { padding: 15px 5px; }

        .user-card {
            background: var(--card-bg); border-radius: 20px;
            width: 98%; margin: 0 auto;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* ↕️ TABLE SCROLL FIX */
        .table-responsive {
            width: 100%;
            overflow-x: auto; /* Enable touch scrolling */
            -webkit-overflow-scrolling: touch;
        }

        .table { 
            color: #fff; vertical-align: middle; margin-bottom: 0;
            min-width: 500px; /* Minimum width to prevent squeezing */
        }

        .table thead th { 
            background: rgba(0, 242, 254, 0.1); border: none; 
            color: var(--neon-blue); font-size: 0.7rem; padding: 12px;
            text-transform: uppercase;
        }

        .user-row td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }

        /* Badge & Actions */
        .badge-role { padding: 4px 10px; border-radius: 50px; font-size: 0.6rem; font-weight: bold; border: 1px solid; }
        .bg-reseller { background: rgba(0, 242, 254, 0.1); color: var(--neon-blue); border-color: var(--neon-blue); }
        .bg-owner { background: rgba(255, 49, 49, 0.1); color: var(--neon-red); border-color: var(--neon-red); }

        .action-group { display: flex; gap: 5px; }
        .action-btn { 
            width: 32px; height: 32px; border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; border: none;
        }
        .btn-edit { background: rgba(0, 242, 254, 0.2); color: var(--neon-blue); }
        .btn-del { background: rgba(255, 49, 49, 0.2); color: var(--neon-red); }

        /* Modal Fix for Mobile */
        .modal-content { background: #090e1a; border: 2px solid var(--neon-blue); border-radius: 25px; color: #fff; }
        .form-control-custom {
            background: rgba(0,0,0,0.5); border: 1px solid rgba(0, 242, 254, 0.3); color: #fff;
            border-radius: 10px; height: 45px; width: 100%; margin-bottom: 12px; padding: 0 12px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <nav class="navbar sticky-top">
        <div class="container-fluid d-flex align-items: center;">
            <a href="dashboard.html" class="text-white"><i class="bi bi-chevron-left fs-4"></i></a>
            <span class="mx-auto fw-bold" style="letter-spacing: 1px; color: var(--neon-blue);">ARK CORE MEMBERS</span>
        </div>
    </nav>

    <div class="container-fluid main-content">
        <div class="user-card">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th style="width: 35%;">User Profile</th>
                            <th style="width: 20%;">Role</th>
                            <th style="width: 20%;">Balance</th>
                            <th style="width: 25%;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        </tbody>
                </table>
            </div>
            <div id="loader" class="text-center p-4">
                <div class="spinner-border text-info spinner-border-sm"></div>
                <div class="mt-2" style="font-size: 0.7rem;">SYNCING...</div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered mx-3">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h6 class="modal-title fw-bold">EDIT MEMBER</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editUserId">
                    <input type="text" id="editUsername" class="form-control-custom" readonly style="opacity: 0.6;">
                    <input type="text" id="editPassword" class="form-control-custom" placeholder="New Password">
                    <input type="number" id="editBalance" class="form-control-custom" placeholder="Balance">
                    <select id="editRole" class="form-control-custom">
                        <option value="User">Standard User</option>
                        <option value="Reseller">Reseller</option>
                        <option value="Owner">Owner</option>
                    </select>
                    <button class="btn btn-info w-100 fw-bold py-2" style="border-radius: 10px;" onclick="saveToFirebase()">SAVE CHANGES</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyA5u_ExHIn25nKFVBK-vAYqJ7Z5zcy63nQ",
            authDomain: "arkcore-f92a6.firebaseapp.com",
            databaseURL: "https://arkcore-f92a6-default-rtdb.firebaseio.com",
            projectId: "arkcore-f92a6",
            storageBucket: "arkcore-f92a6.firebasestorage.app",
            messagingSenderId: "309961270452",
            appId: "1:309961270452:web:7847734a03c8bfe55123e1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const modalRef = new bootstrap.Modal(document.getElementById('editModal'));

        // Load Real-time Data
        db.ref('Users').on('value', (snap) => {
            document.getElementById('loader').style.display = 'none';
            const body = document.getElementById('userTableBody');
            body.innerHTML = "";
            
            snap.forEach((child) => {
                const u = child.val();
                const key = child.key;
                const roleClass = u.role === 'Owner' ? 'bg-owner' : 'bg-reseller';
                
                body.innerHTML += `
                    <tr class="user-row">
                        <td>
                            <div class="fw-bold" style="font-size: 0.8rem;">${u.username}</div>
                            <div style="font-size: 0.55rem; color: #6c757d;">P: ${u.password}</div>
                        </td>
                        <td><span class="badge-role ${roleClass}">${u.role || 'User'}</span></td>
                        <td class="fw-bold text-success">₹${u.balance || 0}</td>
                        <td>
                            <div class="action-group">
                                <button class="action-btn btn-edit" onclick="openEdit('${key}')"><i class="bi bi-pencil-fill"></i></button>
                                <button class="action-btn btn-del" onclick="deleteUser('${key}')"><i class="bi bi-trash-fill"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        });

        function openEdit(key) {
            db.ref('Users/' + key).once('value', (s) => {
                const d = s.val();
                document.getElementById('editUserId').value = key;
                document.getElementById('editUsername').value = d.username;
                document.getElementById('editPassword').value = d.password;
                document.getElementById('editBalance').value = d.balance || 0;
                document.getElementById('editRole').value = d.role || 'User';
                modalRef.show();
            });
        }

        function saveToFirebase() {
            const key = document.getElementById('editUserId').value;
            db.ref('Users/' + key).update({
                password: document.getElementById('editPassword').value,
                balance: document.getElementById('editBalance').value,
                role: document.getElementById('editRole').value
            }).then(() => {
                modalRef.hide();
                alert("Data Updated!");
            });
        }

        function deleteUser(key) {
            if(confirm("Permanently delete this user?")) db.ref('Users/' + key).remove();
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
