<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arkcore - Elite User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --neon-blue: #00f2fe; 
            --card-bg: #0d1630; 
            --neon-red: #ff3131; 
            --neon-green: #10b981;
        }
        body { 
            background: radial-gradient(circle at center, #0a1128 0%, #000411 100%);
            color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; min-height: 100vh;
        }

        /* Navbar Fix */
        .navbar { 
            background: rgba(13, 22, 48, 0.95); backdrop-filter: blur(15px); 
            border-bottom: 2px solid var(--neon-blue); padding: 12px 20px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }
        .brand-name { font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 10px var(--neon-blue); color: var(--neon-blue); }
        
        .main-content { padding: 20px 10px; }

        /* 🔥 SLIDE FIX: Table Container */
        .user-card {
            background: var(--card-bg); border-radius: 25px; padding: 10px;
            border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            overflow: hidden; /* Bahar na nikle */
        }

        .scroll-wrapper {
            overflow-x: auto; /* Enable Horizontal Scroll */
            -webkit-overflow-scrolling: touch;
            border-radius: 15px;
        }

        .table { 
            color: #fff; vertical-align: middle; margin-bottom: 0; 
            min-width: 600px; /* Force width taaki slide ho sake */
        }
        
        .table thead th { 
            background: rgba(0, 242, 254, 0.1); border: none; 
            color: var(--neon-blue); font-size: 0.75rem; text-transform: uppercase; padding: 15px; 
        }
        
        .user-row td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .badge-role { padding: 5px 12px; border-radius: 50px; font-size: 0.65rem; font-weight: 800; border: 1px solid; }
        .bg-reseller { background: rgba(0, 242, 254, 0.1); color: var(--neon-blue); border-color: var(--neon-blue); }
        .bg-owner { background: rgba(255, 49, 49, 0.1); color: var(--neon-red); border-color: var(--neon-red); }

        /* Action Buttons */
        .action-group { display: flex; gap: 10px; }
        .action-btn { 
            width: 35px; height: 35px; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; border: none;
        }
        .btn-edit { background: rgba(0, 242, 254, 0.2); color: var(--neon-blue); }
        .btn-del { background: rgba(255, 49, 49, 0.2); color: var(--neon-red); }

        /* Modal styling as per your previous style */
        .modal-content { background: #090e1a; border: 2px solid var(--neon-blue); border-radius: 30px; color: #fff; }
        .form-control-custom {
            background: rgba(0,0,0,0.5); border: 1px solid rgba(0, 242, 254, 0.3); color: #fff;
            border-radius: 12px; height: 45px; width: 100%; margin-bottom: 15px; padding: 0 15px;
        }
        .btn-save { background: var(--neon-blue); color: #000; font-weight: bold; border-radius: 12px; width: 100%; border: none; padding: 12px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <nav class="navbar sticky-top">
        <div class="container-fluid">
            <a href="dashboard.html" class="text-white"><i class="bi bi-chevron-left fs-4"></i></a>
            <span class="navbar-brand brand-name mx-auto">ARK CORE MEMBERS</span>
        </div>
    </nav>

    <div class="container main-content">
        <div class="user-card">
            <div class="scroll-wrapper">
                <table class="table">
                    <thead>
                        <tr>
                            <th>User Details</th>
                            <th>Role</th>
                            <th>Balance</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        </tbody>
                </table>
            </div>
            <div id="loader" class="text-center p-4">
                <div class="spinner-border text-info spinner-border-sm"></div>
                <div class="mt-2 small">SYNCING DATABASE...</div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered px-4">
            <div class="modal-content p-2">
                <div class="modal-header border-0">
                    <h6 class="modal-title fw-bold text-info">EDIT MEMBER DATA</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editUserId">
                    <label class="small text-muted mb-1">Username (Fixed)</label>
                    <input type="text" id="editUsername" class="form-control-custom" readonly>
                    
                    <label class="small text-muted mb-1">New Password</label>
                    <input type="text" id="editPassword" class="form-control-custom">
                    
                    <label class="small text-muted mb-1">Update Balance (₹)</label>
                    <input type="number" id="editBalance" class="form-control-custom">
                    
                    <label class="small text-muted mb-1">System Role</label>
                    <select id="editRole" class="form-control-custom">
                        <option value="User">Standard User</option>
                        <option value="Reseller">Reseller</option>
                        <option value="Owner">Owner</option>
                    </select>
                    
                    <button class="btn-save mt-2" onclick="saveToFirebase()">UPDATE NOW</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyA5u_ExHIn25nKFVBK-vAYqJ7Z5zcy63nQ",
            authDomain: "arkcore-f92a6.firebaseapp.com",
            databaseURL: "https://arkcore-f92a6-default-rtdb.firebaseio.com",
            projectId: "arkcore-f92a6",
            storageBucket: "arkcore-f92a6.firebasestorage.app",
            messagingSenderId: "309961270452",
            appId: "1:309961270452:web:7847734a03c8bfe55123e1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const modalRef = new bootstrap.Modal(document.getElementById('editModal'));

        // Load Users
        db.ref('Users').on('value', (snap) => {
            document.getElementById('loader').style.display = 'none';
            const body = document.getElementById('userTableBody');
            body.innerHTML = "";
            
            snap.forEach((child) => {
                const u = child.val();
                const key = child.key;
                const roleClass = u.role === 'Owner' ? 'bg-owner' : 'bg-reseller';
                
                body.innerHTML += `
                    <tr class="user-row">
                        <td>
                            <div class="fw-bold">${u.username}</div>
                            <div style="font-size: 0.6rem; color: #6c757d;">PWD: ${u.password}</div>
                        </td>
                        <td><span class="badge-role ${roleClass}">${u.role || 'User'}</span></td>
                        <td class="fw-bold text-success">₹${u.balance || 0}</td>
                        <td>
                            <div class="action-group">
                                <button class="action-btn btn-edit" onclick="openEdit('${key}')"><i class="bi bi-pencil-fill"></i></button>
                                <button class="action-btn btn-del" onclick="deleteUser('${key}')"><i class="bi bi-trash-fill"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        });

        function openEdit(key) {
            db.ref('Users/' + key).once('value', (s) => {
                const d = s.val();
                document.getElementById('editUserId').value = key;
                document.getElementById('editUsername').value = d.username;
                document.getElementById('editPassword').value = d.password;
                document.getElementById('editBalance').value = d.balance || 0;
                document.getElementById('editRole').value = d.role || 'User';
                modalRef.show();
            });
        }

        function saveToFirebase() {
            const key = document.getElementById('editUserId').value;
            db.ref('Users/' + key).update({
                password: document.getElementById('editPassword').value,
                balance: document.getElementById('editBalance').value,
                role: document.getElementById('editRole').value
            }).then(() => {
                modalRef.hide();
                alert("Updated!");
            });
        }

        function deleteUser(key) {
            if(confirm("Delete this user?")) db.ref('Users/' + key).remove();
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
