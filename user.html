<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arkcore - Advanced Member Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --neon-blue: #00f2fe; 
            --dark-deep: #020617;
            --card-glass: rgba(13, 22, 48, 0.8);
            --neon-red: #ff3131; 
        }
        
        body { 
            background-color: var(--dark-deep);
            background-image: radial-gradient(at 0% 0%, rgba(0, 242, 254, 0.15) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(10, 71, 208, 0.15) 0, transparent 50%);
            color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; min-height: 100vh;
            overflow-x: hidden;
        }

        /* 👑 ELITE TOP BAR */
        .navbar { 
            background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(0, 242, 254, 0.3); padding: 18px 20px;
            position: sticky; top: 0; z-index: 1000;
        }
        .brand-name { font-weight: 900; letter-spacing: 4px; text-shadow: 0 0 15px var(--neon-blue); color: var(--neon-blue); font-size: 1.2rem; }

        .main-content { padding: 25px 8px; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 📱 RESPONSIVE CONTAINER */
        .user-card {
            background: var(--card-glass); backdrop-filter: blur(15px);
            border-radius: 28px; border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); overflow: hidden;
        }

        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .table { color: #fff; vertical-align: middle; margin-bottom: 0; min-width: 550px; }

        .table thead th { 
            background: rgba(0, 242, 254, 0.05); border: none; 
            color: var(--neon-blue); font-size: 0.75rem; padding: 20px 15px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .user-row { transition: background 0.3s; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .user-row td { padding: 18px 15px; border: none; }

        /* Role Badges */
        .badge-role { padding: 6px 14px; border-radius: 12px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
        .bg-reseller { background: rgba(0, 242, 254, 0.15); color: var(--neon-blue); border: 1px solid var(--neon-blue); }
        .bg-owner { background: rgba(255, 49, 49, 0.15); color: var(--neon-red); border: 1px solid var(--neon-red); }

        /* 🔥 ACTION BUTTONS */
        .action-group { display: flex; gap: 12px; }
        .action-btn { 
            width: 42px; height: 42px; border-radius: 14px; 
            display: flex; align-items: center; justify-content: center; border: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-edit { background: rgba(0, 242, 254, 0.1); color: var(--neon-blue); box-shadow: 0 4px 10px rgba(0, 242, 254, 0.1); }
        .btn-del { background: rgba(255, 49, 49, 0.1); color: var(--neon-red); box-shadow: 0 4px 10px rgba(255, 49, 49, 0.1); }
        .action-btn:active { transform: scale(0.9); }

        /* ⏳ FAST LOADER */
        #loader { 
            padding: 60px 0; text-align: center; background: var(--card-glass);
            border-radius: 28px; margin-top: 10px;
        }
        .loader-glow {
            width: 45px; height: 45px; border: 3px solid transparent;
            border-top-color: var(--neon-blue); border-radius: 50%;
            animation: spin-glow 0.8s linear infinite; display: inline-block;
            filter: drop-shadow(0 0 8px var(--neon-blue));
        }
        @keyframes spin-glow { to { transform: rotate(360deg); } }

        /* Modal Ultra-Premium */
        .modal-content { 
            background: #020617; border: 1px solid rgba(0, 242, 254, 0.4); 
            border-radius: 32px; color: #fff; box-shadow: 0 0 40px rgba(0, 242, 254, 0.2);
        }
        .form-input-elite {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; color: #fff; padding: 15px; width: 100%; margin-bottom: 15px;
            transition: 0.3s;
        }
        .form-input-elite:focus { border-color: var(--neon-blue); background: rgba(0, 242, 254, 0.05); outline: none; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <a href="dashboard.html" class="text-white"><i class="bi bi-arrow-left-short fs-2"></i></a>
            <span class="brand-name">ARK CORE MEMBERS</span>
            <i class="bi bi-person-badge text-info fs-4"></i>
        </div>
    </nav>

    <div class="container main-content">
        <div class="row g-3 mb-4">
            <div class="col-6">
                <div class="user-card p-3 text-center">
                    <div class="small text-muted mb-1">TOTAL USERS</div>
                    <div class="h4 mb-0 fw-bold" id="totalCount">...</div>
                </div>
            </div>
            <div class="col-6">
                <div class="user-card p-3 text-center">
                    <div class="small text-muted mb-1">TOTAL BALANCE</div>
                    <div class="h4 mb-0 fw-bold text-success" id="totalCash">...</div>
                </div>
            </div>
        </div>

        <div class="user-card" id="tableBox">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>MEMBER IDENTITY</th>
                            <th>SYSTEM ROLE</th>
                            <th>WALLET</th>
                            <th>OPERATIONS</th>
                        </tr>
                    </thead>
                    <tbody id="userListBody">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="loader">
            <div class="loader-glow"></div>
            <div class="mt-3 small fw-bold text-info" style="letter-spacing: 2px;">SECURE DATA SYNCING...</div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered mx-3">
            <div class="modal-content p-2">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">MODIFY ACCOUNT</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-0">
                    <input type="hidden" id="targetId">
                    <label class="small text-muted mb-2">Username (Locked)</label>
                    <input type="text" id="targetUser" class="form-input-elite" readonly style="color: #64748b;">
                    
                    <label class="small text-muted mb-2">Change Password</label>
                    <input type="text" id="targetPass" class="form-input-elite" placeholder="New Password">
                    
                    <label class="small text-muted mb-2">Balance Amount (₹)</label>
                    <input type="number" id="targetBal" class="form-input-elite">
                    
                    <label class="small text-muted mb-2">Account Privilege</label>
                    <select id="targetRole" class="form-input-elite">
                        <option value="User">Standard User</option>
                        <option value="Reseller">Elite Reseller</option>
                        <option value="Owner">ARK Owner</option>
                    </select>
                    
                    <button class="btn btn-info w-100 fw-bold py-3 mt-2" style="border-radius: 18px; box-shadow: 0 10px 20px rgba(0, 242, 254, 0.2);" onclick="applyChanges()">SAVE DATABASE UPDATES</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyA5u_ExHIn25nKFVBK-vAYqJ7Z5zcy63nQ",
            authDomain: "arkcore-f92a6.firebaseapp.com",
            databaseURL: "https://arkcore-f92a6-default-rtdb.firebaseio.com",
            projectId: "arkcore-f92a6",
            storageBucket: "arkcore-f92a6.firebasestorage.app",
            messagingSenderId: "309961270452",
            appId: "1:309961270452:web:7847734a03c8bfe55123e1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const editModal = new bootstrap.Modal(document.getElementById('editModal'));

        // 🚀 FAST LOADING LOGIC
        // Using 'value' once first for speed, then 'on' for real-time updates
        function syncDatabase() {
            db.ref('Users').on('value', (snap) => {
                const loader = document.getElementById('loader');
                const list = document.getElementById('userListBody');
                const totalCountEl = document.getElementById('totalCount');
                const totalCashEl = document.getElementById('totalCash');
                
                loader.style.display = 'none';
                list.innerHTML = "";
                
                let count = 0;
                let totalCash = 0;

                if(!snap.exists()) {
                    list.innerHTML = "<tr><td colspan='4' class='text-center p-5'>No Records Found</td></tr>";
                    return;
                }

                snap.forEach((child) => {
                    const u = child.val();
                    const key = child.key;
                    count++;
                    totalCash += parseInt(u.balance || 0);

                    const roleClass = u.role === 'Owner' ? 'bg-owner' : 'bg-reseller';
                    
                    list.innerHTML += `
                        <tr class="user-row">
                            <td>
                                <div class="fw-bold" style="letter-spacing: 0.5px;">${u.username}</div>
                                <div class="text-muted" style="font-size: 0.6rem; font-family: monospace;">SEC_ID: ${key.slice(0,8)}</div>
                            </td>
                            <td><span class="badge-role ${roleClass}">${u.role || 'User'}</span></td>
                            <td class="fw-bold text-info">₹${u.balance || 0}</td>
                            <td>
                                <div class="action-group">
                                    <button class="action-btn btn-edit" onclick="launchEdit('${key}')"><i class="bi bi-pencil-square"></i></button>
                                    <button class="action-btn btn-del" onclick="secureDelete('${key}')"><i class="bi bi-trash3-fill"></i></button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
                
                totalCountEl.innerText = count;
                totalCashEl.innerText = '₹' + totalCash.toLocaleString();
            });
        }

        function launchEdit(id) {
            db.ref('Users/' + id).once('value', (s) => {
                const d = s.val();
                document.getElementById('targetId').value = id;
                document.getElementById('targetUser').value = d.username;
                document.getElementById('targetPass').value = d.password;
                document.getElementById('targetBal').value = d.balance || 0;
                document.getElementById('targetRole').value = d.role || 'User';
                editModal.show();
            });
        }

        function applyChanges() {
            const id = document.getElementById('targetId').value;
            db.ref('Users/' + id).update({
                password: document.getElementById('targetPass').value,
                balance: document.getElementById('targetBal').value,
                role: document.getElementById('targetRole').value
            }).then(() => {
                editModal.hide();
                // Simple Toast Notification
                alert("Database Synced Successfully.");
            });
        }

        function secureDelete(id) {
            if(confirm(`WARNING: Remove member ${id} from ARK CORE? This cannot be undone.`)) {
                db.ref('Users/' + id).remove();
            }
        }

        // Start Sync
        syncDatabase();
    </script>
</body>
</html>
