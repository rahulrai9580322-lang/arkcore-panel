<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arkcore - User Management</title>
    <link href="https://cdn.应用.com/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --neon-blue: #00f2fe; --card-bg: #0d1630; --neon-red: #ef4444; }
        body { 
            background: radial-gradient(circle at center, #0a1128 0%, #000411 100%);
            color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; min-height: 100vh;
        }
        .navbar { background: rgba(13, 22, 48, 0.85); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 242, 254, 0.2); padding: 15px 20px; }
        .brand-name { font-weight: 800; letter-spacing: 2px; text-shadow: 0 0 10px var(--neon-blue); }
        .main-content { padding: 30px 15px; }

        .user-card {
            background: var(--card-bg); border-radius: 22px; padding: 20px;
            border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow-x: auto;
        }
        .table { color: #fff; vertical-align: middle; width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .table thead th { border: none; color: #8fa3cc; font-size: 0.75rem; text-transform: uppercase; padding-left: 15px; }
        .user-row { background: rgba(255,255,255,0.02); border-radius: 15px; }
        .user-row td { padding: 15px; border: none; }
        .user-row td:first-child { border-radius: 15px 0 0 15px; }
        .user-row td:last-child { border-radius: 0 15px 15px 0; }

        .badge-role { padding: 5px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: bold; }
        .bg-reseller { background: rgba(0, 242, 254, 0.2); color: var(--neon-blue); border: 1px solid var(--neon-blue); }

        /* Modal / Popup Styling */
        .modal-content { background: var(--card-bg); border: 2px solid var(--neon-blue); border-radius: 25px; color: #fff; }
        .modal-header { border-bottom: 1px solid rgba(0, 242, 254, 0.1); }
        .form-control-custom {
            background: #040816; border: 1px solid rgba(0, 242, 254, 0.3); color: #fff;
            border-radius: 12px; padding: 12px; margin-bottom: 15px; width: 100%;
        }
        .form-control-custom:focus { border-color: var(--neon-blue); outline: none; box-shadow: 0 0 10px rgba(0, 242, 254, 0.3); }
        
        .btn-save { background: var(--neon-blue); color: #000; font-weight: bold; border-radius: 12px; width: 100%; border: none; padding: 15px; transition: 0.3s; }
        .btn-save:active { transform: scale(0.95); }

        .action-btn { width: 40px; height: 40px; border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; border: none; cursor: pointer; transition: 0.3s; }
        .btn-edit { background: rgba(0, 242, 254, 0.15); color: var(--neon-blue); }
        .btn-edit:hover { background: var(--neon-blue); color: #000; }
    </style>
</head>
<body>

    <nav class="navbar sticky-top">
        <div class="container-fluid">
            <a href="dashboard.html" class="text-white"><i class="bi bi-arrow-left fs-4"></i></a>
            <span class="navbar-brand brand-name mx-auto">USER MGMT</span>
        </div>
    </nav>

    <div class="container main-content">
        <div class="user-card">
            <table class="table">
                <thead>
                    <tr>
                        <th>User Details</th>
                        <th>Role</th>
                        <th>Balance</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="userListBody">
                    <tr class="user-row">
                        <td>
                            <div class="fw-bold" id="name_1">Anony_Gaming</div>
                            <div class="small text-muted">ID: #88210</div>
                        </td>
                        <td><span class="badge-role bg-reseller" id="role_1">Reseller</span></td>
                        <td id="bal_1">₹2,500</td>
                        <td>
                            <button class="action-btn btn-edit" onclick="openEdit('1', 'Anony_Gaming', 'Reseller', '2500')">
                                <i class="bi bi-pencil-square"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered px-3">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Edit Reseller Details</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editUserId">
                    
                    <label class="small text-info mb-1 fw-bold">USERNAME</label>
                    <input type="text" id="editName" class="form-control-custom">

                    <label class="small text-info mb-1 fw-bold">NEW PASSWORD</label>
                    <input type="password" id="editPass" class="form-control-custom" placeholder="••••••••">

                    <label class="small text-info mb-1 fw-bold">BALANCE (₹)</label>
                    <input type="number" id="editBalance" class="form-control-custom">

                    <label class="small text-info mb-1 fw-bold">ROLE</label>
                    <select id="editRole" class="form-control-custom">
                        <option value="Reseller">Reseller</option>
                        <option value="Owner">Owner</option>
                    </select>

                    <button class="btn-save mt-3" onclick="saveData()">SAVE UPDATES</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyA5u_ExHIn25nKFVBK-vAYqJ7Z5zcy63nQ",
            authDomain: "arkcore-f92a6.firebaseapp.com",
            databaseURL: "https://arkcore-f92a6-default-rtdb.firebaseio.com",
            projectId: "arkcore-f92a6",
            storageBucket: "arkcore-f92a6.firebasestorage.app",
            messagingSenderId: "309961270452",
            appId: "1:309961270452:web:7847734a03c8bfe55123e1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Modal variable initialize
        var myModal = new bootstrap.Modal(document.getElementById('editModal'));

        // Function to open modal and fill data
        function openEdit(id, name, role, balance) {
            document.getElementById('editUserId').value = id;
            document.getElementById('editName').value = name;
            document.getElementById('editBalance').value = balance;
            document.getElementById('editRole').value = role;
            
            myModal.show();
        }

        // Function to save and update UI + FIREBASE
        function saveData() {
            const id = document.getElementById('editUserId').value;
            const name = document.getElementById('editName').value;
            const bal = document.getElementById('editBalance').value;
            const role = document.getElementById('editRole').value;
            const pass = document.getElementById('editPass').value;

            // Database Update logic
            const updates = {
                name: name,
                balance: bal,
                role: role
            };
            if(pass) updates.password = pass; // Agar password dala hai toh hi update karega

            // Firebase mein push kar raha hai (Aapka username hi ID hai)
            db.ref('users/' + name).update(updates).then(() => {
                // Aapka original UI update logic
                document.getElementById('name_' + id).innerText = name;
                document.getElementById('bal_' + id).innerText = '₹' + bal;
                document.getElementById('role_' + id).innerText = role;

                alert("User data updated in Firebase!");
                myModal.hide();
            }).catch(err => alert("Error: " + err.message));
        }

        // Live Data Fetch (Optional: Taaki Firebase se list auto-load ho)
        db.ref('users').on('value', (snapshot) => {
            console.log("Data loaded from Firebase");
        });
    </script>
</body>
</html>
