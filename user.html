<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arkcore - User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --neon-blue: #00f2fe; 
            --card-bg: #0d1630; /* Wahi original blue background */
            --neon-red: #ef4444; 
        }
        
        body { 
            background: radial-gradient(circle at center, #0a1128 0%, #000411 100%);
            color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; min-height: 100vh;
        }

        /* 🔵 ORIGINAL NAVBAR STYLE */
        .navbar { 
            background: rgba(13, 22, 48, 0.85); backdrop-filter: blur(10px); 
            border-bottom: 1px solid rgba(0, 242, 254, 0.2); padding: 15px 20px;
        }
        .brand-name { font-weight: 800; letter-spacing: 2px; text-shadow: 0 0 10px var(--neon-blue); color: #fff; }

        .main-content { padding: 25px 10px; }

        /* 📱 SLIDING TABLE CARD */
        .user-card {
            background: var(--card-bg); border-radius: 22px; padding: 10px;
            border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        
        .table { color: #fff; vertical-align: middle; margin-bottom: 0; min-width: 550px; }
        
        .table thead th { 
            border: none; color: #8fa3cc; font-size: 0.75rem; 
            text-transform: uppercase; padding: 15px; 
        }

        .user-row { background: rgba(255,255,255,0.02); transition: 0.2s; }
        .user-row td { padding: 15px; border: none; border-bottom: 5px solid #0a1128; }

        /* BADGES */
        .badge-role { padding: 5px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: bold; border: 1px solid; }
        .bg-reseller { background: rgba(0, 242, 254, 0.2); color: var(--neon-blue); border-color: var(--neon-blue); }
        .bg-owner { background: rgba(239, 68, 68, 0.2); color: var(--neon-red); border-color: var(--neon-red); }

        /* ACTION BUTTONS */
        .action-group { display: flex; gap: 10px; }
        .action-btn { 
            width: 38px; height: 38px; border-radius: 12px; border: none;
            display: inline-flex; align-items: center; justify-content: center; 
            transition: 0.3s;
        }
        .btn-edit { background: rgba(0, 242, 254, 0.15); color: var(--neon-blue); }
        .btn-del { background: rgba(239, 68, 68, 0.15); color: var(--neon-red); }
        .action-btn:hover { transform: scale(1.1); }

        /* ⚡ SPEED LOADER */
        #loader { text-align: center; padding: 40px; color: var(--neon-blue); }

        /* MODAL STYLE */
        .modal-content { background: var(--card-bg); border: 2px solid var(--neon-blue); border-radius: 25px; color: #fff; }
        .form-control-custom {
            background: #040816; border: 1px solid rgba(0, 242, 254, 0.3); color: #fff;
            border-radius: 12px; padding: 12px; margin-bottom: 15px; width: 100%;
        }
    </style>
</head>
<body>

    <nav class="navbar sticky-top">
        <div class="container-fluid d-flex align-items-center">
            <a href="dashboard.html" class="text-white"><i class="bi bi-arrow-left fs-4"></i></a>
            <span class="navbar-brand brand-name mx-auto">ARK CORE MEMBERS</span>
        </div>
    </nav>

    <div class="container main-content">
        <div class="user-card">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>User Details</th>
                            <th>Role</th>
                            <th>Balance</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        </tbody>
                </table>
            </div>
            <div id="loader">
                <div class="spinner-border text-info spinner-border-sm"></div>
                <div class="mt-2 small fw-bold">DATABASE SYNCING...</div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered px-4">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">EDIT DETAILS</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <input type="text" id="editName" class="form-control-custom" readonly style="opacity: 0.6;">
                    <input type="text" id="editPass" class="form-control-custom" placeholder="New Password">
                    <input type="number" id="editBal" class="form-control-custom" placeholder="Balance (₹)">
                    <select id="editRole" class="form-control-custom">
                        <option value="User">User</option>
                        <option value="Reseller">Reseller</option>
                        <option value="Owner">Owner</option>
                    </select>
                    <button class="btn w-100 py-3 fw-bold" style="background: var(--neon-blue); border-radius: 15px;" onclick="saveData()">SAVE UPDATES</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyA5u_ExHIn25nKFVBK-vAYqJ7Z5zcy63nQ",
            authDomain: "arkcore-f92a6.firebaseapp.com",
            databaseURL: "https://arkcore-f92a6-default-rtdb.firebaseio.com",
            projectId: "arkcore-f92a6",
            storageBucket: "arkcore-f92a6.firebasestorage.app",
            messagingSenderId: "309961270452",
            appId: "1:309961270452:web:7847734a03c8bfe55123e1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myModal = new bootstrap.Modal(document.getElementById('editModal'));

        // 🏎️ FAST STREAMING FETCH
        db.ref('Users').on('value', (snap) => {
            const list = document.getElementById('userTableBody');
            document.getElementById('loader').style.display = 'none';
            list.innerHTML = "";

            snap.forEach((child) => {
                const u = child.val();
                const key = child.key;
                const roleClass = u.role === 'Owner' ? 'bg-owner' : 'bg-reseller';
                
                list.innerHTML += `
                    <tr class="user-row">
                        <td>
                            <div class="fw-bold">${u.username}</div>
                            <div class="small text-muted" style="font-size:0.6rem">PWD: ${u.password}</div>
                        </td>
                        <td><span class="badge-role ${roleClass}">${u.role || 'User'}</span></td>
                        <td class="fw-bold text-success">₹${u.balance || 0}</td>
                        <td>
                            <div class="action-group">
                                <button class="action-btn btn-edit" onclick="openEdit('${key}')"><i class="bi bi-pencil-square"></i></button>
                                <button class="action-btn btn-del" onclick="delUser('${key}')"><i class="bi bi-trash-fill"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        });

        function openEdit(id) {
            db.ref('Users/' + id).once('value', (s) => {
                const d = s.val();
                document.getElementById('editId').value = id;
                document.getElementById('editName').value = d.username;
                document.getElementById('editPass').value = d.password;
                document.getElementById('editBal').value = d.balance || 0;
                document.getElementById('editRole').value = d.role || 'User';
                myModal.show();
            });
        }

        function saveData() {
            const id = document.getElementById('editId').value;
            db.ref('Users/' + id).update({
                password: document.getElementById('editPass').value,
                balance: document.getElementById('editBal').value,
                role: document.getElementById('editRole').value
            }).then(() => {
                myModal.hide();
                alert("Database Updated!");
            });
        }

        function delUser(id) {
            if(confirm("Delete this member?")) db.ref('Users/' + id).remove();
        }
    </script>
</body>
</html>
