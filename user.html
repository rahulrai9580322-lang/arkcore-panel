<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arkcore - Elite User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --neon-blue: #00f2fe; 
            --card-bg: #0d1630; 
            --neon-red: #ff3131; 
            --neon-green: #10b981;
        }
        body { 
            background: radial-gradient(circle at center, #0a1128 0%, #000411 100%);
            color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; min-height: 100vh;
            padding-bottom: 50px;
        }
        .navbar { 
            background: rgba(13, 22, 48, 0.9); backdrop-filter: blur(15px); 
            border-bottom: 2px solid var(--neon-blue); padding: 15px 20px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
        }
        .brand-name { font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 10px var(--neon-blue); color: var(--neon-blue); }
        
        .main-content { padding: 30px 10px; }

        .user-card {
            background: var(--card-bg); border-radius: 30px; padding: 15px;
            border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        /* Responsive Table Design */
        .table-responsive { border-radius: 20px; overflow: hidden; }
        .table { color: #fff; vertical-align: middle; margin-bottom: 0; }
        .table thead { background: rgba(0, 242, 254, 0.1); }
        .table thead th { border: none; color: var(--neon-blue); font-size: 0.8rem; text-transform: uppercase; padding: 15px; }
        
        .user-row { transition: 0.3s; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .user-row:hover { background: rgba(255,255,255,0.03); }
        .user-row td { padding: 18px 15px; border: none; }

        .badge-role { padding: 6px 14px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; border: 1px solid; }
        .bg-reseller { background: rgba(0, 242, 254, 0.1); color: var(--neon-blue); border-color: var(--neon-blue); }
        .bg-owner { background: rgba(255, 49, 49, 0.1); color: var(--neon-red); border-color: var(--neon-red); }

        .balance-text { font-weight: 800; color: var(--neon-green); font-family: monospace; font-size: 1rem; }

        /* Actions */
        .action-group { display: flex; gap: 8px; }
        .action-btn { 
            width: 38px; height: 38px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            border: none; transition: 0.3s; font-size: 1.1rem;
        }
        .btn-edit { background: rgba(0, 242, 254, 0.1); color: var(--neon-blue); }
        .btn-del { background: rgba(255, 49, 49, 0.1); color: var(--neon-red); }
        .btn-edit:hover { background: var(--neon-blue); color: #000; }
        .btn-del:hover { background: var(--neon-red); color: #fff; }

        /* Modal Customization */
        .modal-content { 
            background: #090e1a; border: 2px solid var(--neon-blue); 
            border-radius: 35px; color: #fff; box-shadow: 0 0 50px rgba(0, 242, 254, 0.3);
        }
        .modal-header { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 25px; }
        .form-control-custom {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(0, 242, 254, 0.3); color: #fff;
            border-radius: 15px; height: 50px; padding: 0 20px; width: 100%; margin-bottom: 20px;
        }
        .form-control-custom:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); outline: none; }
        
        .btn-save { 
            background: linear-gradient(90deg, #00f2fe, #0097fe); color: #000; 
            font-weight: 800; border-radius: 15px; width: 100%; border: none; 
            padding: 15px; margin-top: 10px; letter-spacing: 1px;
        }

        #loader { text-align: center; padding: 50px; color: var(--neon-blue); }
    </style>
</head>
<body>

    <nav class="navbar sticky-top">
        <div class="container-fluid">
            <a href="dashboard.html" class="text-white"><i class="bi bi-chevron-left fs-4"></i></a>
            <span class="navbar-brand brand-name mx-auto">ARK CORE MEMBERS</span>
            <div style="width: 30px;"></div>
        </div>
    </nav>

    <div class="container main-content">
        <div class="user-card">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>User Profile</th>
                            <th>Role</th>
                            <th>Balance</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        </tbody>
                </table>
            </div>
            <div id="loader">
                <div class="spinner-border text-info"></div>
                <div class="mt-2 small fw-bold">FETCHING REAL-TIME DATABASE...</div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered px-3">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold text-info"><i class="bi bi-person-gear"></i> EDIT MEMBER</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editOldUser"> <label class="small text-info mb-2 fw-bold ml-2">MEMBER USERNAME</label>
                    <input type="text" id="editUsername" class="form-control-custom" readonly style="opacity: 0.6;">

                    <label class="small text-info mb-2 fw-bold ml-2">UPDATE PASSWORD</label>
                    <input type="text" id="editPassword" class="form-control-custom" placeholder="Enter New Password">

                    <label class="small text-info mb-2 fw-bold ml-2">WALLET BALANCE (₹)</label>
                    <input type="number" id="editBalance" class="form-control-custom">

                    <label class="small text-info mb-2 fw-bold ml-2">SYSTEM ROLE</label>
                    <select id="editRole" class="form-control-custom">
                        <option value="User">Standard User</option>
                        <option value="Reseller">Elite Reseller</option>
                        <option value="Owner">System Owner</option>
                    </select>

                    <button class="btn-save" onclick="updateUserInFirebase()">APPLY CHANGES</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyA5u_ExHIn25nKFVBK-vAYqJ7Z5zcy63nQ",
            authDomain: "arkcore-f92a6.firebaseapp.com",
            databaseURL: "https://arkcore-f92a6-default-rtdb.firebaseio.com",
            projectId: "arkcore-f92a6",
            storageBucket: "arkcore-f92a6.firebasestorage.app",
            messagingSenderId: "309961270452",
            appId: "1:309961270452:web:7847734a03c8bfe55123e1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const editModal = new bootstrap.Modal(document.getElementById('editModal'));

        function playVoice(msg) {
            const s = new SpeechSynthesisUtterance(msg);
            s.lang = 'hi-IN'; s.pitch = 1.3;
            window.speechSynthesis.speak(s);
        }

        // --- 📥 FETCH USERS REAL-TIME ---
        db.ref('Users').on('value', (snapshot) => {
            const container = document.getElementById('userTableBody');
            const loader = document.getElementById('loader');
            loader.style.display = 'none';
            container.innerHTML = "";

            if(!snapshot.exists()) {
                container.innerHTML = "<tr><td colspan='4' class='text-center p-5 text-muted'>No members found.</td></tr>";
                return;
            }

            const users = snapshot.val();
            Object.keys(users).forEach(id => {
                const u = users[id];
                const roleClass = u.role === 'Owner' ? 'bg-owner' : 'bg-reseller';
                
                container.innerHTML += `
                    <tr class="user-row">
                        <td>
                            <div class="fw-bold">${u.username}</div>
                            <div style="font-size: 0.65rem; color: #8fa3cc;">PWD: ${u.password}</div>
                        </td>
                        <td><span class="badge-role ${roleClass}">${u.role || 'User'}</span></td>
                        <td><span class="balance-text">₹${u.balance || '0'}</span></td>
                        <td>
                            <div class="action-group">
                                <button class="action-btn btn-edit" onclick="openEditModal('${id}')">
                                    <i class="bi bi-pencil-square"></i>
                                </button>
                                <button class="action-btn btn-del" onclick="deleteUser('${id}')">
                                    <i class="bi bi-trash3-fill"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        });

        // --- ✍️ EDIT LOGIC ---
        function openEditModal(userId) {
            db.ref('Users/' + userId).once('value', (snapshot) => {
                const u = snapshot.val();
                document.getElementById('editOldUser').value = userId;
                document.getElementById('editUsername').value = u.username;
                document.getElementById('editPassword').value = u.password;
                document.getElementById('editBalance').value = u.balance || 0;
                document.getElementById('editRole').value = u.role || 'User';
                editModal.show();
            });
        }

        function updateUserInFirebase() {
            const userId = document.getElementById('editOldUser').value;
            const newPass = document.getElementById('editPassword').value;
            const newBal = document.getElementById('editBalance').value;
            const newRole = document.getElementById('editRole').value;

            db.ref('Users/' + userId).update({
                password: newPass,
                balance: newBal,
                role: newRole
            }).then(() => {
                playVoice(`User ${userId} details updated successfully.`);
                editModal.hide();
            });
        }

        // --- 🗑️ DELETE LOGIC ---
        function deleteUser(userId) {
            if(confirm(`Are you sure you want to delete ${userId}? Access will be revoked immediately.`)) {
                db.ref('Users/' + userId).remove().then(() => {
                    playVoice("Member removed from database.");
                });
            }
        }
    </script>
</body>
</html>
