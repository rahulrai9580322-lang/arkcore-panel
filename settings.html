<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arkcore - Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --neon-blue: #00f2fe;
            --bg-dark: #050a18;
            --card-bg: #0d1630;
            --sidebar-bg: #040816;
        }

        body {
            background: radial-gradient(circle at center, #0a1128 0%, #000411 100%);
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        /* Navbar & Sidebar (Same as Dashboard) */
        .navbar { background: rgba(13, 22, 48, 0.85); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 242, 254, 0.2); padding: 15px 20px; }
        .brand-name { font-weight: 800; letter-spacing: 2px; text-shadow: 0 0 10px var(--neon-blue); }
        .offcanvas { background-color: var(--sidebar-bg); border-left: 2px solid var(--neon-blue); width: 280px !important; }
        .menu-item { padding: 18px 25px; display: flex; align-items: center; color: #8fa3cc; text-decoration: none; transition: 0.3s; border-radius: 10px; margin: 5px 15px; }
        .menu-item:hover, .menu-item.active { color: var(--neon-blue); background: rgba(0, 242, 254, 0.1); text-shadow: 0 0 5px var(--neon-blue); }
        .menu-item i { margin-right: 15px; font-size: 1.3rem; }

        /* Settings Content */
        .main-content { padding: 30px 15px; }
        .setting-card {
            background: var(--card-bg);
            border-radius: 22px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .section-title { font-size: 1.1rem; font-weight: 700; color: var(--neon-blue); margin-bottom: 20px; text-transform: uppercase; }

        .form-control-custom {
            background-color: rgba(0, 4, 17, 0.5);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 12px;
            color: #fff;
            padding: 12px;
            margin-bottom: 15px;
        }
        .form-control-custom:focus {
            background: rgba(0, 4, 17, 0.8);
            border-color: var(--neon-blue);
            color: #fff;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
            outline: none;
        }

        .btn-update {
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            border: none;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            font-weight: 700;
            color: #000;
            transition: 0.3s;
        }
        .btn-update:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4); }

        .profile-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .p-avatar { width: 60px; height: 60px; background: var(--neon-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; color: #000; }
    </style>
</head>
<body>

    <nav class="navbar sticky-top">
        <div class="container-fluid">
            <span class="navbar-brand brand-name text-white">ARK CORE PANEL</span>
            <button class="btn p-0 border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
                <i class="bi bi-grid-3x3-gap-fill text-white fs-3"></i>
            </button>
        </div>
    </nav>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="sidebarMenu">
        <div class="offcanvas-header border-bottom border-secondary p-4">
            <h5 class="offcanvas-title fw-bold text-white">ARKCORE PANEL</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-0 pt-3">
            <a href="dashboard.html" class="menu-item"><i class="bi bi-house-door"></i> Dashboard</a>
            <a href="keys.html" class="menu-item"><i class="bi bi-key"></i> Total Keys</a>
            <a href="generate_key.html" class="menu-item"><i class="bi bi-plus-square"></i> Generate Key</a>
            <a href="settings.html" class="menu-item active"><i class="bi bi-gear"></i> Settings</a>
            <div class="mt-5 px-4 text-center">
                <a href="logout.html" class="btn btn-outline-danger btn-sm w-100 rounded-pill">LOGOUT SESSION</a>
            </div>
        </div>
    </div>

    <div class="container main-content">
        <div class="setting-card">
            <div class="section-title">Account Profile</div>
            <div class="profile-header">
                <div class="p-avatar" id="setAvatar">U</div>
                <div>
                    <h5 class="mb-0 fw-bold" id="setName">User Name</h5>
                    <small class="text-info" id="setRole">Reseller Account</small>
                </div>
            </div>
        </div>

        <div class="setting-card">
            <div class="section-title">Security & Password</div>
            <form id="passForm">
                <label class="small mb-1 text-secondary">OLD PASSWORD</label>
                <input type="password" class="form-control form-control-custom" placeholder="••••••••" required>
                
                <label class="small mb-1 text-secondary">NEW PASSWORD</label>
                <input type="password" id="newPass" class="form-control form-control-custom" placeholder="Min 6 characters" required>
                
                <button type="submit" class="btn-update mt-2">Update Security</button>
            </form>
        </div>

        <div class="setting-card text-center">
            <div class="section-title">Support & Updates</div>
            <p class="small text-secondary">Any issues with key generation or balance? Contact us on Telegram.</p>
            <a href="#" class="text-neon-link d-block fw-bold" style="color: var(--neon-blue); text-decoration: none;">@ADITYAXCHEAT</a>
        </div>
    </div>

    <script>
        // Load User Data from local storage or session
        document.addEventListener("DOMContentLoaded", function() {
            const user = localStorage.getItem('activeUser') || "Guest User";
            document.getElementById('setName').innerText = user;
            document.getElementById('setAvatar').innerText = user.charAt(0).toUpperCase();
            
            // Agar aap ho toh Owner dikhayega
            if(user === "Aditya" || user === "AdityaRai") {
                document.getElementById('setRole').innerText = "Owner Account";
            }
        });

        document.getElementById('passForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Password Updated Successfully!');
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
