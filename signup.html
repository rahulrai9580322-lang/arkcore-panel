<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arkcore - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2fe; --card-bg: #0d1630; }
        body { 
            background: radial-gradient(circle at center, #0a1128 0%, #000411 100%);
            color: #fff; min-height: 100vh; display: flex; align-items: center; 
            justify-content: center; margin: 0; padding: 20px; font-family: sans-serif;
        }
        .container { width: 100%; max-width: 400px; }
        .card { 
            background: var(--card-bg); border: 2px solid var(--neon-blue); 
            border-radius: 25px; box-shadow: 0 0 20px rgba(0, 242, 254, 0.3); padding: 40px 25px;
        }
        .neon-text {
            color: #fff; text-shadow: 0 0 10px var(--neon-blue);
            font-weight: 800; font-size: 2rem; text-align: center; letter-spacing: 3px;
        }
        .form-control {
            background: #040816; border: 1px solid #1a254a; color: #fff;
            height: 55px; border-radius: 12px; margin-bottom: 15px; font-size: 16px;
        }
        .form-control:focus {
            background: #040816; color: #fff; border-color: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue);
        }
        .btn-neon {
            background: linear-gradient(45deg, #4facfe, #00f2fe); border: none;
            height: 55px; border-radius: 12px; color: #fff; font-weight: bold; width: 100%; margin-top: 10px;
            cursor: pointer;
        }
        .footer-link { text-align: center; margin-top: 25px; }
        .text-neon-link { color: var(--neon-blue); text-decoration: none; font-weight: bold; }
        .error-msg { color: #ff4b2b; font-size: 12px; display: none; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2 class="neon-text mb-5">SIGN UP</h2>
        <div id="errMsg" class="error-msg">Invalid Secret Code!</div>
        <form id="signupForm">
            <input type="text" id="regUser" class="form-control" placeholder="Choose Username" required>
            <input type="password" id="regPass" class="form-control" placeholder="Choose Password" required>
            <input type="text" id="secretCode" class="form-control" placeholder="Secret Code (5 Digits)" maxlength="5" required>
            <button type="submit" class="btn btn-neon">CREATE ACCOUNT</button>
        </form>
        <div class="footer-link">
            <p style="color: #5c6e91; margin-bottom: 5px;">Already have an account?</p>
            <a href="login.html" class="text-neon-link">LOGIN HERE</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('signupForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const code = document.getElementById('secretCode').value;
        const user = document.getElementById('regUser').value;

        // Logic: Secret code 5 digit ka hona chahiye
        if(code.length === 5) {
            alert('Account Created Successfully!');
            localStorage.setItem('activeUser', user);
            window.location.href = "login.html";
        } else {
            document.getElementById('errMsg').style.display = 'block';
        }
    });
</script>
</body>
</html>
