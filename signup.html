<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARK CORE - Secure Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --neon-blue: #0a47d0; 
            --dark-blue: #010409;
            --card-bg: rgba(7, 15, 43, 0.85);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--dark-blue);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; color: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 👑 ELITE HEADER */
        .elite-header {
            background-color: #090e1a;
            padding: 15px 25px;
            display: flex; align-items: center; justify-content: space-between;
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            border-bottom: 2px solid rgba(10, 71, 208, 0.4);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
        }

        .header-logo {
            color: #fff; font-size: 1.5rem; font-weight: 900;
            display: flex; align-items: center; letter-spacing: 3px;
            text-shadow: 0 0 15px var(--neon-blue);
        }

        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .login-container { width: 100%; max-width: 420px; z-index: 10; position: relative; }

        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(30px);
            border: 1px solid rgba(10, 71, 208, 0.3); border-radius: 40px;
            padding: 45px 35px; box-shadow: 0 0 60px rgba(10, 71, 208, 0.2);
            text-align: center; animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .brand-logo {
            font-size: 2.8rem; font-weight: 900; letter-spacing: 5px;
            background: linear-gradient(to right, #fff, #3b82f6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .brand-sub { font-size: 0.7rem; color: #3b82f6; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 35px; font-weight: 700; }

        .input-group-custom { position: relative; margin-bottom: 20px; }
        .input-group-custom i { position: absolute; left: 15px; top: 14px; color: #3b82f6; font-size: 1.1rem; }

        .input-field {
            background: rgba(0, 0, 0, 0.6) !important; border: 1px solid rgba(10, 71, 208, 0.4) !important;
            border-radius: 15px !important; height: 52px; color: #fff !important; 
            padding-left: 45px !important; transition: 0.3s;
        }

        .input-field:focus { border-color: #3b82f6 !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3) !important; }

        .signup-btn {
            background: linear-gradient(90deg, #1e40af 0%, #0a47d0 100%);
            border: none; border-radius: 15px; height: 55px; width: 100%;
            color: white; font-weight: 800; font-size: 1.1rem; letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(10, 71, 208, 0.4); margin-top: 10px; transition: 0.3s;
        }
        .signup-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(10, 71, 208, 0.6); }

        #status-text {
            position: fixed; bottom: 15%; width: 100%; text-align: center;
            color: #fff; z-index: 20; display: none; font-weight: 800;
            text-shadow: 0 0 20px var(--neon-blue); font-size: 1.3rem;
        }

        .footer-link { margin-top: 25px; font-size: 0.9rem; color: rgba(255, 255, 255, 0.5); }
        .footer-link a { color: #3b82f6; text-decoration: none; font-weight: 800; }

        .ark-loader { width: 40px; height: 40px; border: 4px solid rgba(10, 71, 208, 0.2); border-top: 4px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin: 15px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="elite-header">
        <div class="header-logo"><i class="bi bi-fire"></i> ARK CORE</div>
        <div style="font-size: 1.5rem; color: #fff;"><i class="bi bi-shield-lock-fill"></i></div>
    </div>

    <div id="particles-js"></div>

    <div class="login-container" id="signupBox">
        <div class="glass-card">
            <h1 class="brand-logo">ARK CORE</h1>
            <p class="brand-sub">Secure Database Registration</p>
            
            <form id="regForm">
                <div class="input-group-custom">
                    <i class="bi bi-person-plus-fill"></i>
                    <input type="text" id="regUser" class="form-control input-field" placeholder="Create Username" required autocomplete="off">
                </div>
                <div class="input-group-custom">
                    <i class="bi bi-key-fill"></i>
                    <input type="password" id="regPass" class="form-control input-field" placeholder="Create Password" required>
                </div>
                <div class="input-group-custom">
                    <i class="bi bi-patch-check-fill"></i>
                    <input type="text" id="accessKey" class="form-control input-field" placeholder="Enter Access Key" required>
                </div>
                <button type="submit" class="signup-btn" id="regBtn">REGISTER SYSTEM</button>
                <div class="ark-loader" id="mainLoader"></div>
            </form>
            
            <div class="footer-link">
                Already have access? <a href="login.html">Login Panel</a>
            </div>
        </div>
    </div>

    <div id="status-text">INITIALIZING CORE SECURITY...</div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyA5u_ExHIn25nKFVBK-vAYqJ7Z5zcy63nQ",
            authDomain: "arkcore-f92a6.firebaseapp.com",
            databaseURL: "https://arkcore-f92a6-default-rtdb.firebaseio.com",
            projectId: "arkcore-f92a6",
            storageBucket: "arkcore-f92a6.firebasestorage.app",
            messagingSenderId: "309961270452",
            appId: "1:309961270452:web:7847734a03c8bfe55123e1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 70 },
                "color": { "value": "#0a47d0" },
                "size": { "value": 5, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#0a47d0", "opacity": 0.4 },
                "move": { "enable": true, "speed": 1.5 }
            }
        });

        function playProVoice(text) {
            window.speechSynthesis.cancel();
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'hi-IN';
            speech.pitch = 1.3;
            speech.rate = 1.0;
            window.speechSynthesis.speak(speech);
        }

        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('regUser').value.trim();
            const pass = document.getElementById('regPass').value.trim();
            const key = document.getElementById('accessKey').value.trim();
            const loader = document.getElementById('mainLoader');
            const btn = document.getElementById('regBtn');

            btn.style.display = 'none';
            loader.style.display = 'block';

            // 🛡️ Access Key Logic
            // Aapki Owner Key: ARK-OWNER-2026
            let userRole = "User";
            if(key === "ARK-OWNER-2026") {
                userRole = "Owner";
            } else {
                // Yahan aap Firebase se reseller keys check karne ka logic bhi dal sakte hain
                // Par filhal ke liye, agar key owner nahi hai toh hum ise normal reseller maan sakte hain ya block kar sakte hain.
            }

            // 🔍 Duplicate Check
            db.ref('Users/' + user).once('value', (snapshot) => {
                if (snapshot.exists()) {
                    loader.style.display = 'none';
                    btn.style.display = 'block';
                    playProVoice("Yeh username pehle se register hai. Kripya koi dusra naam chune.");
                    alert("ERROR: Username already exists!");
                } else {
                    // 💾 Save User to Firebase
                    db.ref('Users/' + user).set({
                        username: user,
                        password: pass,
                        role: userRole,
                        registrationKey: key,
                        status: "Active",
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    }).then(() => {
                        loader.style.display = 'none';
                        document.getElementById('signupBox').style.opacity = '0.2';
                        document.getElementById('status-text').style.display = 'block';
                        
                        const msg = `Hello ${user}. Welcome to ARK CORE Panel. Aapka account as a ${userRole} successfully register ho gaya hai. Ab aap login kar sakte hain.`;
                        playProVoice(msg);

                        setTimeout(() => {
                            window.location.href = "login.html";
                        }, 6000);
                    });
                }
            });
        });
    </script>
</body>
</html>
