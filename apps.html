<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arkcore - App Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --neon-blue: #00f2fe; --card-bg: #0d1630; --neon-yellow: #ffc107; }
        body { 
            background: radial-gradient(circle at center, #0a1128 0%, #000411 100%);
            color: #fff; font-family: 'Segoe UI', sans-serif; min-height: 100vh;
        }
        .navbar { background: rgba(13, 22, 48, 0.85); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 242, 254, 0.2); padding: 15px 20px; }
        .main-content { padding: 30px 15px; }

        .app-card {
            background: var(--card-bg); border-radius: 22px; padding: 20px;
            border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .table { color: #fff; vertical-align: middle; }
        .pkg-badge { background: rgba(255, 193, 7, 0.1); color: var(--neon-yellow); border: 1px solid var(--neon-yellow); padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; }
        .status-online { color: #10b981; font-size: 0.8rem; }
        .status-offline { color: #ef4444; font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav class="navbar sticky-top">
        <div class="container-fluid">
            <a href="dashboard.html" class="text-white"><i class="bi bi-arrow-left fs-4"></i></a>
            <span class="navbar-brand fw-bold mx-auto" style="letter-spacing: 2px; text-shadow: 0 0 10px var(--neon-blue);">APP MANAGEMENT</span>
        </div>
    </nav>

    <div class="container main-content">
        <div class="app-card">
            <table class="table">
                <thead>
                    <tr>
                        <th>Package Name</th>
                        <th>App Name</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="appListBody">
                    <tr id="row_ark_mod">
                        <td><span class="pkg-badge">com.ark.core</span></td>
                        <td>No Rule x Cheat</td>
                        <td id="status_ark_mod"><span class="status-online"><i class="bi bi-circle-fill me-1" style="font-size: 8px;"></i> Running</span></td>
                        <td><button id="btn_ark_mod" class="btn btn-sm btn-outline-danger" onclick="toggleApp('ark_mod')"><i class="bi bi-power"></i> Stop</button></td>
                    </tr>
                    <tr id="row_vip_cheat">
                        <td><span class="pkg-badge">com.ark.core</span></td>
                        <td>VeNix Loader</td>
                        <td id="status_vip_cheat"><span class="status-online"><i class="bi bi-circle-fill me-1" style="font-size: 8px;"></i> Running</span></td>
                        <td><button id="btn_vip_cheat" class="btn btn-sm btn-outline-danger" onclick="toggleApp('vip_cheat')"><i class="bi bi-power"></i> Stop</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA5u_ExHIn25nKFVBK-vAYqJ7Z5zcy63nQ",
            authDomain: "arkcore-f92a6.firebaseapp.com",
            databaseURL: "https://arkcore-f92a6-default-rtdb.firebaseio.com",
            projectId: "arkcore-f92a6",
            storageBucket: "arkcore-f92a6.firebasestorage.app",
            messagingSenderId: "309961270452",
            appId: "1:309961270452:web:7847734a03c8bfe55123e1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function toggleApp(appId) {
            const statusLabel = document.getElementById('status_' + appId);
            const btn = document.getElementById('btn_' + appId);
            const isCurrentlyRunning = statusLabel.innerText.includes("Running");
            
            const newStatus = isCurrentlyRunning ? "Stopped" : "Running";
            
            db.ref('apps/' + appId).update({
                status: newStatus
            }).then(() => {
                if(isCurrentlyRunning) {
                    // STOP KAR DIYA -> Ab START dikhao
                    statusLabel.innerHTML = '<span class="status-offline"><i class="bi bi-circle-fill me-1" style="font-size: 8px;"></i> Stopped</span>';
                    btn.innerHTML = '<i class="bi bi-play-fill"></i> Start';
                    btn.className = 'btn btn-sm btn-outline-success'; // Green color
                } else {
                    // START KAR DIYA -> Ab STOP dikhao
                    statusLabel.innerHTML = '<span class="status-online"><i class="bi bi-circle-fill me-1" style="font-size: 8px;"></i> Running</span>';
                    btn.innerHTML = '<i class="bi bi-power"></i> Stop';
                    btn.className = 'btn btn-sm btn-outline-danger'; // Red color
                }
            }).catch(err => console.error("Firebase Error:", err));
        }

        // Live update from Firebase (Taaki agar database se koi change kare toh panel pe dikhe)
        db.ref('apps').on('child_changed', (snapshot) => {
            const appId = snapshot.key;
            const data = snapshot.val();
            const statusLabel = document.getElementById('status_' + appId);
            const btn = document.getElementById('btn_' + appId);

            if(data.status === "Running") {
                statusLabel.innerHTML = '<span class="status-online"><i class="bi bi-circle-fill me-1" style="font-size: 8px;"></i> Running</span>';
                btn.innerHTML = '<i class="bi bi-power"></i> Stop';
                btn.className = 'btn btn-sm btn-outline-danger';
            } else {
                statusLabel.innerHTML = '<span class="status-offline"><i class="bi bi-circle-fill me-1" style="font-size: 8px;"></i> Stopped</span>';
                btn.innerHTML = '<i class="bi bi-play-fill"></i> Start';
                btn.className = 'btn btn-sm btn-outline-success';
            }
        });
    </script>
</body>
</html>
