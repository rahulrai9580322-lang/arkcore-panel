<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARK CORE - Secure Access</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root { 
            --neon-blue: #0a47d0; /* Deep Dark Blue Glow */
            --dark-blue: #010409;
            --card-bg: rgba(7, 15, 43, 0.7);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--dark-blue);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; color: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 👑 ELITE HEADER */
        .elite-header {
            background-color: #090e1a;
            padding: 12px 25px;
            display: flex; align-items: center; justify-content: space-between;
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            border-bottom: 1px solid rgba(10, 71, 208, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        .header-logo {
            color: #fff; font-size: 1.4rem; font-weight: 800;
            display: flex; align-items: center; letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
        }

        .header-logo i { margin-right: 12px; font-size: 1.6rem; filter: drop-shadow(0 0 8px var(--neon-blue)); }

        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background-color: #010409; }

        .login-container { width: 100%; max-width: 400px; z-index: 10; position: relative; margin-top: 60px; }

        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(25px);
            border: 1px solid rgba(10, 71, 208, 0.25); border-radius: 35px;
            padding: 50px 35px; box-shadow: 0 0 50px rgba(10, 71, 208, 0.15);
            text-align: center; animation: fadeInCard 1.2s ease-out;
        }

        @keyframes fadeInCard { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .brand-logo {
            font-size: 2.8rem; font-weight: 900; letter-spacing: 5px;
            background: linear-gradient(to right, #fff, #1e3a8a);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(10, 71, 208, 0.6); margin-bottom: 5px;
        }

        .brand-sub { font-size: 0.7rem; color: #1e3a8a; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 35px; font-weight: 600; }

        .input-field {
            background: rgba(0, 0, 0, 0.5) !important; border: 1px solid rgba(10, 71, 208, 0.3) !important;
            border-radius: 15px !important; height: 55px; color: #fff !important; margin-bottom: 20px;
        }

        .login-btn {
            background: linear-gradient(90deg, #1e3a8a 0%, #1e40af 100%);
            border: none; border-radius: 15px; height: 55px; width: 100%;
            color: white; font-weight: bold; font-size: 1.1rem; letter-spacing: 2px;
        }

        #status-text {
            position: fixed; bottom: 20%; width: 100%; text-align: center;
            color: #fff; z-index: 20; display: none; font-weight: bold;
            text-shadow: 0 0 15px var(--neon-blue); font-size: 1.2rem;
        }

        /* 🔗 Connected Link Style */
        .footer-link { margin-top: 25px; font-size: 0.85rem; color: rgba(255, 255, 255, 0.5); }
        .footer-link a { color: #1e40af; text-decoration: none; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="elite-header">
        <div class="header-logo"><i class="bi bi-fire"></i> ARK CORE</div>
        <div style="font-size: 1.5rem; color: #fff;"><i class="bi bi-grid-3x3-gap-fill"></i></div>
    </div>

    <div id="particles-js"></div>

    <div class="login-container" id="loginBox">
        <div class="glass-card">
            <h1 class="brand-logo">ARK CORE</h1>
            <p class="brand-sub">Elite BGMI Core System</p>
            
            <form id="authForm">
                <input type="text" id="username" class="form-control input-field" placeholder="Username" required autocomplete="off">
                <input type="password" id="password" class="form-control input-field" placeholder="Access Password" required>
                <button type="submit" class="btn login-btn">LOGIN SYSTEM</button>
            </form>
            
            <div class="footer-link">
                Don't have an account? <a href="signup.html">Create Account</a>
            </div>

            <div class="mt-3" style="font-size: 0.7rem; color: rgba(255,255,255,0.3); letter-spacing: 1px;">
                SECURITY STATUS: <span style="color: #1e3a8a;">ENCRYPTED</span>
            </div>
        </div>
    </div>

    <div id="status-text">AUTHENTICATING SECURE SESSION...</div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 70 },
                "color": { "value": "#0a47d0" },
                "size": { "value": 10, "random": true },
                "line_linked": { "enable": true, "distance": 180, "color": "#0a47d0", "opacity": 0.3, "width": 2 },
                "move": { "enable": true, "speed": 1.5 }
            }
        });

        // 🔊 Professional Female Voice
        function playProVoice(text) {
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'hi-IN';
            speech.pitch = 1.4; // Clear professional female tone
            speech.rate = 1.0;
            window.speechSynthesis.speak(speech);
        }

        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('status-text').style.display = 'block';
            
            const msg = `Welcome back ${user}. ARK CORE system is now authenticating your session. Aapka swagat hai. Yeh BGMI high level Hacking software hai. Hamara ARK CORE sabse best hai.`;
            playProVoice(msg);

            setTimeout(() => {
                window.location.href = "dashboard.html"; // Connected to Dashboard
            }, 8000);
        });
    </script>
</body>
</html>
