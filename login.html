<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARK CORE - Secure Access</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --neon-blue: #0a47d0; 
            --dark-blue: #010409;
            --card-bg: rgba(7, 15, 43, 0.85);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--dark-blue);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; color: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 👑 ELITE HEADER */
        .elite-header {
            background-color: #090e1a;
            padding: 15px 25px;
            display: flex; align-items: center; justify-content: space-between;
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            border-bottom: 2px solid rgba(10, 71, 208, 0.4);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
        }

        .header-logo {
            color: #fff; font-size: 1.5rem; font-weight: 900;
            display: flex; align-items: center; letter-spacing: 3px;
            text-shadow: 0 0 15px var(--neon-blue);
        }

        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .login-container { width: 100%; max-width: 420px; z-index: 10; position: relative; }

        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(30px);
            border: 1px solid rgba(10, 71, 208, 0.3); border-radius: 40px;
            padding: 55px 40px; box-shadow: 0 0 60px rgba(10, 71, 208, 0.2);
            text-align: center; animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .brand-logo {
            font-size: 3rem; font-weight: 900; letter-spacing: 6px;
            background: linear-gradient(to right, #fff, #3b82f6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .brand-sub { font-size: 0.75rem; color: #3b82f6; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; font-weight: 700; }

        .input-group-custom { position: relative; margin-bottom: 25px; }
        .input-group-custom i { position: absolute; left: 15px; top: 16px; color: #3b82f6; font-size: 1.2rem; }

        .input-field {
            background: rgba(0, 0, 0, 0.6) !important; border: 1px solid rgba(10, 71, 208, 0.4) !important;
            border-radius: 18px !important; height: 58px; color: #fff !important; 
            padding-left: 50px !important; transition: 0.3s;
        }

        .input-field:focus { border-color: #3b82f6 !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4) !important; }

        .login-btn {
            background: linear-gradient(90deg, #1e40af 0%, #0a47d0 100%);
            border: none; border-radius: 18px; height: 58px; width: 100%;
            color: white; font-weight: 800; font-size: 1.1rem; letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(10, 71, 208, 0.4); transition: 0.3s;
        }

        .login-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(10, 71, 208, 0.6); }

        #status-text {
            position: fixed; bottom: 15%; width: 100%; text-align: center;
            color: #fff; z-index: 20; display: none; font-weight: 800;
            text-shadow: 0 0 20px var(--neon-blue); font-size: 1.3rem; letter-spacing: 1px;
        }

        .footer-link { margin-top: 30px; font-size: 0.9rem; color: rgba(255, 255, 255, 0.5); }
        .footer-link a { color: #3b82f6; text-decoration: none; font-weight: 800; }

        /* Loader Animation */
        .ark-loader { width: 50px; height: 50px; border: 5px solid rgba(10, 71, 208, 0.2); border-top: 5px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="elite-header">
        <div class="header-logo"><i class="bi bi-fire"></i> ARK CORE</div>
        <div style="font-size: 1.5rem; color: #fff;"><i class="bi bi-cpu-fill"></i></div>
    </div>

    <div id="particles-js"></div>

    <div class="login-container" id="loginBox">
        <div class="glass-card">
            <h1 class="brand-logo">ARK CORE</h1>
            <p class="brand-sub">Elite BGMI Security System</p>
            
            <form id="authForm">
                <div class="input-group-custom">
                    <i class="bi bi-person-fill"></i>
                    <input type="text" id="username" class="form-control input-field" placeholder="Username" required autocomplete="off">
                </div>
                <div class="input-group-custom">
                    <i class="bi bi-shield-lock-fill"></i>
                    <input type="password" id="password" class="form-control input-field" placeholder="Access Password" required>
                </div>
                <button type="submit" class="btn login-btn" id="loginBtn">LOGIN SYSTEM</button>
                <div class="ark-loader" id="mainLoader"></div>
            </form>
            
            <div class="footer-link">
                New User? <a href="signup.html">Register Account</a>
            </div>
        </div>
    </div>

    <div id="status-text">ESTABLISHING ENCRYPTED CONNECTION...</div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyA5u_ExHIn25nKFVBK-vAYqJ7Z5zcy63nQ",
            authDomain: "arkcore-f92a6.firebaseapp.com",
            databaseURL: "https://arkcore-f92a6-default-rtdb.firebaseio.com",
            projectId: "arkcore-f92a6",
            storageBucket: "arkcore-f92a6.firebasestorage.app",
            messagingSenderId: "309961270452",
            appId: "1:309961270452:web:7847734a03c8bfe55123e1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 🛡️ SECURITY CHECK: Check if already logged in
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = "dashboard.html";
        }

        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "color": { "value": "#0a47d0" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5 },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#0a47d0", "opacity": 0.4, "width": 1 },
                "move": { "enable": true, "speed": 2 }
            }
        });

        function playProVoice(text) {
            window.speechSynthesis.cancel(); // Stop any previous voice
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'hi-IN';
            speech.pitch = 1.3;
            speech.rate = 1.0;
            window.speechSynthesis.speak(speech);
        }

        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const loginBtn = document.getElementById('loginBtn');
            const loader = document.getElementById('mainLoader');
            const statusText = document.getElementById('status-text');

            loginBtn.style.display = 'none';
            loader.style.display = 'block';

            // 🔍 Firebase REAL Check
            db.ref('Users/' + user).once('value', (snapshot) => {
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    
                    if (userData.password === pass) {
                        // SUCCESS LOGIN
                        loader.style.display = 'none';
                        document.getElementById('loginBox').style.opacity = '0.3';
                        statusText.style.display = 'block';
                        
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('activeUser', user);

                        const msg = `Welcome back ${user}. ARK CORE system is now authenticating your secure session. Aapka swagat hai. Hamara system sabse best aur secure hai.`;
                        playProVoice(msg);

                        setTimeout(() => {
                            window.location.href = "dashboard.html";
                        }, 5000);
                    } else {
                        // WRONG PASSWORD
                        loader.style.display = 'none';
                        loginBtn.style.display = 'block';
                        playProVoice("Access Denied. Galat password dala hai aapne. Kripya sahi password enter karein.");
                        alert("ERROR: Wrong Password!");
                    }
                } else {
                    // USER NOT FOUND
                    loader.style.display = 'none';
                    loginBtn.style.display = 'block';
                    playProVoice("User not found. Aapka account database mein nahi mila. Kripya pehle sign up karein.");
                    alert("ERROR: User not registered!");
                }
            }).catch((error) => {
                console.error(error);
                loader.style.display = 'none';
                loginBtn.style.display = 'block';
                alert("Database Connection Error!");
            });
        });
    </script>
</body>
</html>
