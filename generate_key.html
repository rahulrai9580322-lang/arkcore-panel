    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARK CORE | Master Panel</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --cyan: #00f2fe; --neon-red: #ff3131; --panel-bg: #0a0f1e; }
        body { background: #000411; color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        .ark-header { background: rgba(10, 15, 30, 0.9); backdrop-filter: blur(10px); border-bottom: 2px solid var(--cyan); padding: 15px 20px; position: sticky; top: 0; z-index: 1000; }
        .balance-pill { background: rgba(0, 242, 254, 0.1); border: 1px solid var(--cyan); border-radius: 50px; padding: 5px 15px; color: var(--cyan); font-weight: 800; }
        
        .ark-card { background: var(--panel-bg); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .owner-only { border-left: 5px solid var(--neon-red) !important; display: none; } /* Default hidden */
        
        .input-group-text { background: #161b2e; border: 1px solid rgba(0,242,254,0.2); color: #888; }
        .form-control, .form-select { background: #000; border: 1px solid rgba(0,242,254,0.2); color: #fff; padding: 12px; }
        .form-control:focus { background: #000; color: #fff; border-color: var(--cyan); box-shadow: 0 0 15px rgba(0,242,254,0.2); }
        
        .btn-gen { background: linear-gradient(45deg, #00f2fe, #0061ff); border: none; font-weight: 800; padding: 12px; border-radius: 12px; width: 100%; transition: 0.3s; }
        .btn-owner { background: linear-gradient(45deg, #ff3131, #a80000); border: none; font-weight: 800; padding: 12px; border-radius: 12px; width: 100%; }
        
        .status-tag { font-size: 0.7rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; display: block; margin-bottom: 10px; }
        .log-row { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 10px 0; font-size: 0.85rem; }
    </style>
</head>
<body>

    <nav class="ark-header d-flex justify-content-between align-items-center">
        <div class="fw-bold fs-4"><i class="bi bi-shield-fill-check me-2"></i>ARK <span style="color:var(--cyan)">CORE</span></div>
        <div class="balance-pill" id="topBal">SYNCING...</div>
    </nav>

    <div class="container py-4">

        <div id="ownerSection" class="ark-card owner-only">
            <span class="status-tag text-danger"><i class="bi bi-person-plus-fill"></i> Owner Secret Console</span>
            <form id="accessForm">
                <div class="mb-3">
                    <label class="small text-secondary mb-1">Create Access Role</label>
                    <select id="newRole" class="form-select">
                        <option value="Reseller">Reseller (Limited Balance)</option>
                        <option value="Owner">Co-Owner (Full Power)</option>
                    </select>
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="small text-secondary mb-1">Initial Balance (₹)</label>
                        <input type="number" id="newBal" class="form-control" value="5000">
                    </div>
                    <div class="col-6">
                        <label class="small text-secondary mb-1">Key Limit</label>
                        <input type="number" id="newLimit" class="form-control" value="100">
                    </div>
                </div>
                <button type="submit" class="btn-owner">CREATE SIGNUP CODE</button>
            </form>
            <div id="codeArea" class="mt-3 p-3 border border-dashed border-danger text-center animate__animated animate__fadeIn" style="display:none; border-radius:15px; background:rgba(255,49,49,0.05);">
                <span class="text-secondary small">MASTER CODE:</span><br>
                <span id="generatedCode" class="fw-bold fs-4 text-danger">---</span>
            </div>
        </div>

        <div class="ark-card">
            <span class="status-tag text-info"><i class="bi bi-key-fill"></i> License Authorization Engine</span>
            <form id="licenseForm">
                <div class="mb-3">
                    <label class="small text-secondary mb-1">Game Package (Target ID)</label>
                    <input type="text" id="pkg" class="form-control" value="com.pubg.imobile" required>
                </div>
                <div class="row g-2 mb-4">
                    <div class="col-6">
                        <label class="small text-secondary mb-1">Duration</label>
                        <select id="plan" class="form-select">
                           <option value="10000">1 Month Premium (₹10,000)</option>
                            <option value="20000">2 Month Ultimate (₹20,000)</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="small text-secondary mb-1">Device Slots</label>
                        <select id="devs" class="form-select">
                            <option value="1">1 Device (Base)</option>
                            <option value="2">2 Devices (+₹5,000)</option>
                            <option value="3">3 Devices (+₹10,000)</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-gen shadow">GENERATE MASTER KEY</button>
            </form>
        </div>

        <div class="ark-card">
            <span class="status-tag text-secondary"><i class="bi bi-list-ul"></i> System Generation Logs</span>
            <div id="logList">
                <div class="text-center text-secondary py-3">Fetching database records...</div>
            </div>
        </div>

    </div>

    <script>
        // 📡 CONFIG:
        const firebaseConfig = {
            apiKey: "AIzaSyA5u_ExHIn25nKFVBK-vAYqJ7Z5zcy63nQ",
            authDomain: "arkcore-f92a6.firebaseapp.com",
            databaseURL: "https://arkcore-f92a6-default-rtdb.firebaseio.com",
            projectId: "arkcore-f92a6",
            storageBucket: "arkcore-f92a6.firebasestorage.app",
            messagingSenderId: "309961270452",
            appId: "1:309961270452:web:7847734a03c8bfe55123e1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 🆔 CURRENT SESSION
        const CURRENT_UID = "-ONyC_2D2P8yK5rLh2_G"; // Aapka Fixed UID
        let myData = null;

        // 🔄 INSTANT SYNC (No Refresh Needed)
        db.ref('Users/' + CURRENT_UID).on('value', (snap) => {
            if(snap.exists()){
                myData = snap.val();
                const balTag = document.getElementById('topBal');
                
                // 💎 OWNER LOGIC
                if(myData.role === "Owner") {
                    balTag.innerText = "UNLIMITED";
                    document.getElementById('ownerSection').style.display = 'block';
                } else {
                    balTag.innerText = "₹" + parseInt(myData.balance || 0).toLocaleString();
                    document.getElementById('ownerSection').style.display = 'none';
                }
            }
        });

        // 🚀 LICENSE GEN (Owner & Reseller)
        document.getElementById('licenseForm').onsubmit = (e) => {
            e.preventDefault();
            const cost = 100000;

            if(myData.role !== "Owner" && (myData.balance < cost)) {
                alert("ACCESS DENIED: INSUFFICIENT BALANCE (₹1,00,000 Required)");
                return;
            }

            const key = "ARK-" + Math.random().toString(36).substring(2, 14).toUpperCase();
            const updateMap = {};

            if(myData.role !== "Owner") {
                updateMap['/Users/' + CURRENT_UID + '/balance'] = myData.balance - cost;
            }

            updateMap['/Keys/' + key] = {
                key: key,
                package: document.getElementById('pkg').value,
                creator: CURRENT_UID,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            db.ref().update(updateMap).then(() => {
                alert("SUCCESS! Key Generated: " + key);
            });
        };

        // 🛑 OWNER ONLY: CREATE ACCESS CODE
        document.getElementById('accessForm').onsubmit = (e) => {
            e.preventDefault();
            const code = "ACC-" + Math.random().toString(36).substring(2, 10).toUpperCase();
            
            db.ref('Secrets').push({
                code: code,
                role: document.getElementById('newRole').value,
                balance: document.getElementById('newBal').value,
                limit: document.getElementById('newLimit').value,
                status: "unused"
            }).then(() => {
                document.getElementById('generatedCode').innerText = code;
                document.getElementById('codeArea').style.display = 'block';
            });
        };

        // 📋 LOG SYNC
        db.ref('Keys').limitToLast(5).on('value', (snap) => {
            const list = document.getElementById('logList');
            list.innerHTML = "";
            snap.forEach(c => {
                const k = c.val();
                list.innerHTML += `<div class="log-row d-flex justify-content-between">
                    <span class="fw-bold text-info">${k.key}</span>
                    <span class="text-secondary small">${k.package}</span>
                </div>`;
            });
        });
    </script>
</body>
</html>
