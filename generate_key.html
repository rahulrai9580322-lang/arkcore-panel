<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARK CORE - Key Generator Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --neon-blue: #00f2fe;
            --bg-dark: #050a18;
            --card-bg: rgba(13, 22, 48, 0.9);
            --sidebar-bg: #040816;
            --neon-red: #ef4444;
            --neon-green: #00ff88;
        }

        body {
            background: radial-gradient(circle at center, #0a1128 0%, #000411 100%);
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background Particles Effect */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1; z-index: -1;
        }

        /* Navbar & Sidebar */
        .navbar {
            background: rgba(13, 22, 48, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
        }
        .brand-name { font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 15px var(--neon-blue); font-size: 1.5rem; }

        .offcanvas { background-color: var(--sidebar-bg); border-left: 3px solid var(--neon-blue); }
        .menu-item { 
            padding: 15px 25px; display: flex; align-items: center; color: #8fa3cc; 
            text-decoration: none; transition: 0.4s; border-radius: 12px; margin: 8px 15px;
            border: 1px solid transparent;
        }
        .menu-item:hover, .menu-item.active { 
            color: var(--neon-blue); background: rgba(0, 242, 254, 0.1); 
            border-color: rgba(0, 242, 254, 0.3); box-shadow: 0 0 15px rgba(0, 242, 254, 0.1);
        }

        /* Cards Styling */
        .gen-card {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 242, 254, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            position: relative; overflow: hidden;
        }
        .gen-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .form-label { color: var(--neon-blue); font-weight: 700; font-size: 0.8rem; letter-spacing: 1px; }
        .form-control-custom {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(0, 242, 254, 0.2);
            color: #fff; border-radius: 12px; padding: 12px;
        }
        .form-control-custom:focus {
            background: rgba(0,0,0,0.6); border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); color: #fff;
        }

        /* Buttons */
        .btn-ark {
            background: linear-gradient(45deg, #00f2fe, #0061ff);
            border: none; border-radius: 12px; padding: 15px;
            font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
            transition: 0.3s; box-shadow: 0 5px 20px rgba(0, 242, 254, 0.3);
        }
        .btn-ark:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0, 242, 254, 0.5); }

        /* Key Result Box */
        .result-box {
            background: rgba(0, 242, 254, 0.05); border: 2px dashed var(--neon-blue);
            border-radius: 15px; padding: 20px; text-align: center;
            display: none; margin-top: 20px; animation: slideIn 0.5s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .key-text { 
            font-family: 'Courier New', monospace; font-size: 1.6rem; 
            color: var(--neon-blue); font-weight: 900; text-shadow: 0 0 10px var(--neon-blue);
            display: block; margin: 10px 0;
        }

        /* History Table */
        .history-card {
            background: rgba(4, 8, 22, 0.8); border-radius: 20px; padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .table { color: #fff; border-color: rgba(255,255,255,0.05); }
        .badge-status { border-radius: 6px; padding: 5px 10px; font-size: 0.7rem; font-weight: bold; }
        .bg-unused { background: var(--neon-green); color: #000; }
        .bg-used { background: var(--neon-red); color: #fff; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <nav class="navbar sticky-top">
        <div class="container-fluid">
            <span class="navbar-brand brand-name text-white">
                <i class="bi bi-fire me-2"></i>ARK CORE <span style="color:var(--neon-blue)">GEN</span>
            </span>
            <button class="btn" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
                <i class="bi bi-grid-3x3-gap-fill text-white fs-3"></i>
            </button>
        </div>
    </nav>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="sidebarMenu">
        <div class="offcanvas-header border-bottom border-secondary p-4">
            <h5 class="offcanvas-title fw-bold text-white">CORE MANAGEMENT</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-0 pt-3">
            <a href="dashboard.html" class="menu-item"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="keys.html" class="menu-item"><i class="bi bi-safe2"></i> Key Database</a>
            <a href="generate_key.html" class="menu-item active"><i class="bi bi-plus-circle-dotted"></i> Key Generator</a>
            <a href="settings.html" class="menu-item"><i class="bi bi-shield-lock"></i> Security</a>
            <div class="mt-auto p-4">
                <a href="login.html" class="btn btn-outline-danger w-100 rounded-pill">LOGOUT SYSTEM</a>
            </div>
        </div>
    </div>

    <div class="container py-5">
        <div class="row">
            <div class="col-lg-6">
                <div class="gen-card">
                    <h5 class="mb-4"><i class="bi bi-cpu me-2 text-info"></i> GENERATE LICENSE KEY</h5>
                    <form id="licenseForm">
                        <div class="mb-3">
                            <label class="form-label">GAME PACKAGE</label>
                            <input type="text" id="packageName" class="form-control form-control-custom" value="com.pubg.imobile" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">DURATION</label>
                                <select id="duration" class="form-select form-control-custom">
                                    <option value="1">1 Month Plan</option>
                                    <option value="2">2 Months Plan</option>
                                    <option value="12">1 Year Plan</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">DEVICE LIMIT</label>
                                <select id="devLimit" class="form-select form-control-custom">
                                    <option value="1">1 Device Only</option>
                                    <option value="2">2 Devices</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-ark w-100 mt-3">GENERATE MASTER KEY</button>
                    </form>

                    <div id="licenseResult" class="result-box">
                        <span class="small text-secondary">YOUR GENERATED KEY:</span>
                        <span id="licenseKeyDisplay" class="key-text">ARK-XXXX-XXXX</span>
                        <button class="btn btn-sm btn-outline-info rounded-pill px-4" onclick="copyKey()">COPY TO CLIPBOARD</button>
                    </div>
                </div>
            </div>

            <div class="col-lg-6" id="ownerTools" style="display: none;">
                <div class="gen-card" style="border-color: var(--neon-red);">
                    <h5 class="mb-4 text-danger"><i class="bi bi-shield-check me-2"></i> OWNER SECRET CONSOLE</h5>
                    <form id="secretForm">
                        <div class="mb-3">
                            <label class="form-label">RESELLER NAME</label>
                            <input type="text" id="resellerName" class="form-control form-control-custom" placeholder="e.g. AdityaModder" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">KEY LIMIT</label>
                                <input type="number" id="keyLimit" class="form-control form-control-custom" value="100">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">BALANCE (₹)</label>
                                <input type="number" id="initBalance" class="form-control form-control-custom" value="5000">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 rounded-pill mt-3 fw-bold">CREATE SIGNUP CODE</button>
                    </form>
                    <div id="secretResult" class="result-box" style="border-color: var(--neon-red);">
                        <span class="small text-danger">SIGNUP CODE (Share Privately):</span>
                        <span id="secretCodeDisplay" class="key-text" style="color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red);">-----</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="history-card mt-4">
            <h6 class="mb-4 text-info"><i class="bi bi-clock-history me-2"></i> RECENTLY GENERATED KEYS</h6>
            <div class="table-responsive">
                <table class="table table-dark table-hover">
                    <thead>
                        <tr>
                            <th>KEY</th>
                            <th>PACKAGE</th>
                            <th>EXPIRY</th>
                            <th>STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyA5u_ExHIn25nKFVBK-vAYqJ7Z5zcy63nQ",
            authDomain: "arkcore-f92a6.firebaseapp.com",
            databaseURL: "https://arkcore-f92a6-default-rtdb.firebaseio.com",
            projectId: "arkcore-f92a6",
            storageBucket: "arkcore-f92a6.firebasestorage.app",
            messagingSenderId: "309961270452",
            appId: "1:309961270452:web:7847734a03c8bfe55123e1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 🛡️ Owner Access Verification
        const currentUser = { role: "Owner" }; // In production, get this from Session
        if(currentUser.role === "Owner") document.getElementById('ownerTools').style.display = "block";

        // 🎲 Random Key Generator
        function generateStr(len) {
            let res = '';
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            for (let i = 0; i < len; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
            return res;
        }

        // 🪄 Generate License Key
        document.getElementById('licenseForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const pkg = document.getElementById('packageName').value;
            const months = parseInt(document.getElementById('duration').value);
            const devLimit = document.getElementById('devLimit').value;
            const finalKey = `ARK-${generateStr(12)}`;
            
            // Calculate Expiry Date
            const expDate = new Date();
            expDate.setMonth(expDate.getMonth() + months);

            db.ref('Keys').child(finalKey).set({
                key: finalKey,
                package: pkg,
                expiry: expDate.toDateString(),
                deviceLimit: devLimit,
                status: "active",
                generatedBy: "MunnaKumarRai",
                timestamp: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                document.getElementById('licenseKeyDisplay').innerText = finalKey;
                document.getElementById('licenseResult').style.display = 'block';
                loadHistory();
            });
        });

        // 🔗 Secret Signup Code
        document.getElementById('secretForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const resName = document.getElementById('resellerName').value;
            const finalSecret = generateStr(5);
            
            db.ref('Secrets').push({
                code: finalSecret,
                reseller: resName,
                limit: document.getElementById('keyLimit').value,
                balance: document.getElementById('initBalance').value,
                status: "active"
            }).then(() => {
                document.getElementById('secretCodeDisplay').innerText = finalSecret;
                document.getElementById('secretResult').style.display = 'block';
            });
        });

        // 📋 Copy Function
        function copyKey() {
            const key = document.getElementById('licenseKeyDisplay').innerText;
            navigator.clipboard.writeText(key);
            alert("Key Copied: " + key);
        }

        // 📊 Load History
        function loadHistory() {
            db.ref('Keys').limitToLast(5).once('value', (snapshot) => {
                const tbody = document.getElementById('historyBody');
                tbody.innerHTML = '';
                snapshot.forEach((child) => {
                    const data = child.val();
                    tbody.innerHTML += `
                        <tr>
                            <td class="text-info fw-bold">${data.key}</td>
                            <td>${data.package}</td>
                            <td>${data.expiry}</td>
                            <td><span class="badge-status bg-unused">${data.status.toUpperCase()}</span></td>
                        </tr>
                    `;
                });
            });
        }
        loadHistory();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
