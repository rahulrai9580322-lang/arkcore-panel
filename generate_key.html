<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARK CORE | Enterprise Access Control</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --cyan: #00f2fe;
            --neon-red: #ff3131;
            --bg-dark: #020610;
            --glass: rgba(13, 22, 48, 0.95);
        }

        body {
            background: radial-gradient(circle at top, #0d1630 0%, #000411 100%);
            color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; min-height: 100vh;
        }

        .ark-nav {
            background: var(--glass); backdrop-filter: blur(25px);
            border-bottom: 2px solid var(--cyan); padding: 15px 25px;
            box-shadow: 0 5px 25px rgba(0, 242, 254, 0.2);
            position: sticky; top: 0; z-index: 1000;
        }

        .balance-card {
            background: rgba(0, 242, 254, 0.05); border: 1px solid var(--cyan);
            border-radius: 12px; padding: 5px 15px; font-weight: 800; color: var(--cyan);
        }

        .ark-panel {
            background: var(--glass); border-radius: 25px; padding: 30px;
            margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .owner-console { border-left: 6px solid var(--neon-red) !important; }

        .tag { font-size: 0.7rem; font-weight: 900; letter-spacing: 2px; color: var(--cyan); margin-bottom: 15px; display: block; }

        .input-group-ark { margin-bottom: 20px; }
        .input-group-ark label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 8px; font-weight: bold; }
        
        .input-box {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 12px; color: #fff; padding: 14px; width: 100%; transition: 0.3s;
        }
        .input-box:focus { border-color: var(--cyan); outline: none; box-shadow: 0 0 15px rgba(0,242,254,0.1); }

        .btn-ark {
            background: linear-gradient(45deg, #00f2fe, #0061ff);
            border: none; border-radius: 15px; padding: 16px; width: 100%;
            font-weight: 900; letter-spacing: 1px; color: #fff; margin-top: 10px;
        }

        .btn-owner {
            background: linear-gradient(45deg, #ff3131, #a70000);
            border: none; border-radius: 15px; padding: 16px; width: 100%;
            font-weight: 900; color: #fff;
        }

        .key-box {
            background: rgba(0,0,0,0.6); border: 2px dashed var(--cyan);
            border-radius: 15px; padding: 20px; margin-top: 20px; display: none; text-align: center;
        }

        .pricing-info { font-size: 0.8rem; color: var(--cyan); margin-top: 10px; text-align: right; }
    </style>
</head>
<body>

    <nav class="ark-nav d-flex justify-content-between align-items-center">
        <div class="fw-bold fs-5"><i class="bi bi-shield-check me-2"></i>ARK CORE <span style="color:var(--cyan)">GEN</span></div>
        <div class="balance-card"><i class="bi bi-wallet2 me-2"></i><span id="displayBal">Syncing...</span></div>
    </nav>

    <div class="container py-4">
        
        <div id="ownerSection" style="display: none;">
            <div class="ark-panel owner-console">
                <span class="tag" style="color: var(--neon-red);"><i class="bi bi-terminal-fill me-2"></i>OWNER PRIVILEGED CONSOLE</span>
                <form id="ownerKeyForm">
                    <div class="row g-3">
                        <div class="col-6">
                            <div class="input-group-ark">
                                <label>TARGET ROLE</label>
                                <select id="genRole" class="input-box">
                                    <option value="Reseller">Reseller</option>
                                    <option value="Owner">Co-Owner</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="input-group-ark">
                                <label>LOAD BALANCE (₹)</label>
                                <input type="number" id="genBal" class="input-box" value="10000">
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn-owner">GENERATE ACCESS TOKEN</button>
                </form>
                <div id="ownerKeyResult" class="key-box" style="border-color: var(--neon-red);">
                    <div class="small text-danger">TOKEN CREATED:</div>
                    <div id="tokenOutput" class="fs-4 fw-bold text-white mt-1">---</div>
                </div>
            </div>
        </div>

        <div class="ark-panel">
            <span class="tag"><i class="bi bi-cpu-fill me-2"></i>LICENSE GENERATION ENGINE</span>
            <form id="licenseForm">
                <div class="input-group-ark">
                    <label>GAME PACKAGE NAME (TARGET ID)</label>
                    <input type="text" id="packageName" class="input-box" value="com.pubg.imobile" required>
                </div>

                <div class="row g-3">
                    <div class="col-6">
                        <div class="input-group-ark">
                            <label>DURATION PLAN</label>
                            <select id="planDuration" class="input-box" onchange="calculatePrice()">
                                <option value="10000">1 Month Plan</option>
                                <option value="20000">2 Months Plan</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="input-group-ark">
                            <label>DEVICE SLOT LIMIT</label>
                            <select id="deviceCount" class="input-box" onchange="calculatePrice()">
                                <option value="1">1 Device (Default)</option>
                                <option value="2">2 Devices (+₹5,000)</option>
                                <option value="3">3 Devices (+₹10,000)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="totalPriceDisplay" class="pricing-info">Est. Cost: ₹10,000</div>
                <button type="submit" class="btn-ark mt-3">CONFIRM & GENERATE MASTER KEY</button>
            </form>

            <div id="licenseResult" class="key-box">
                <div class="small text-info">KEY ACTIVATED SUCCESSFULLY:</div>
                <div id="finalKey" class="fs-3 fw-bold text-white mt-1">ARK-XXXX-XXXX</div>
                <button class="btn btn-sm btn-outline-info mt-3 rounded-pill" onclick="copyKey()">COPY KEY</button>
            </div>
        </div>

        <div class="ark-panel">
            <span class="tag"><i class="bi bi-clock-history me-2"></i>RECENT GENERATIONS</span>
            <div class="table-responsive">
                <table class="table table-dark table-borderless align-middle m-0" style="font-size: 0.85rem;">
                    <thead>
                        <tr class="text-secondary small">
                            <th>KEY IDENTITY</th>
                            <th>PACKAGE</th>
                            <th>DEVICES</th>
                            <th>STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE INITIALIZATION
        const firebaseConfig = {
            apiKey: "AIzaSyA5u_ExHIn25nKFVBK-vAYqJ7Z5zcy63nQ",
            authDomain: "arkcore-f92a6.firebaseapp.com",
            databaseURL: "https://arkcore-f92a6-default-rtdb.firebaseio.com",
            projectId: "arkcore-f92a6",
            storageBucket: "arkcore-f92a6.firebasestorage.app",
            messagingSenderId: "309961270452",
            appId: "1:309961270452:web:7847734a03c8bfe55123e1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // MASTER SESSION CONFIG
        const USER_ID = "-ONyC_2D2P8yK5rLh2_G"; 
        let userRole = "";
        let currentBalance = 0;

        // 🔄 REAL-TIME SYNC & PERMISSION FIX
        db.ref('Users/' + USER_ID).on('value', (snap) => {
            if(snap.exists()) {
                const data = snap.val();
                userRole = data.role;
                currentBalance = parseInt(data.balance || 0);

                // FIX: Visibility & Display Logic
                if(userRole === "Owner") {
                    document.getElementById('displayBal').innerText = "Unlimited";
                    document.getElementById('ownerSection').style.display = "block";
                } else {
                    document.getElementById('displayBal').innerText = "₹" + currentBalance.toLocaleString();
                    document.getElementById('ownerSection').style.display = "none";
                }
            }
        });

        // 💰 DYNAMIC PRICING LOGIC
        function calculatePrice() {
            const basePlan = parseInt(document.getElementById('planDuration').value);
            const extraDevices = parseInt(document.getElementById('deviceCount').value) - 1;
            const finalPrice = basePlan + (extraDevices * 5000);
            document.getElementById('totalPriceDisplay').innerText = "Total Cost: ₹" + finalPrice.toLocaleString();
            return finalPrice;
        }

        // 🚀 LICENSE GENERATION logic
        document.getElementById('licenseForm').onsubmit = (e) => {
            e.preventDefault();
            const cost = calculatePrice();

            // FIX: Owner bypasses balance check
            if (userRole !== "Owner" && currentBalance < cost) {
                alert("ACCESS DENIED: Insufficient Balance. Please top up.");
                return;
            }

            const generatedKey = "ARK-" + Math.random().toString(36).substring(2, 14).toUpperCase();
            const batch = {};

            // Deduct balance ONLY if NOT owner
            if (userRole !== "Owner") {
                batch['/Users/' + USER_ID + '/balance'] = currentBalance - cost;
            }

            batch['/Keys/' + generatedKey] = {
                key: generatedKey,
                package: document.getElementById('packageName').value,
                devices: document.getElementById('deviceCount').value,
                duration: document.getElementById('planDuration').options[document.getElementById('planDuration').selectedIndex].text,
                status: "active",
                createdBy: USER_ID,
                createdAt: firebase.database.ServerValue.TIMESTAMP
            };

            db.ref().update(batch).then(() => {
                document.getElementById('finalKey').innerText = generatedKey;
                document.getElementById('licenseResult').style.display = "block";
                alert("Success: License Activated");
            });
        };

        // 🛑 OWNER: ACCESS KEY TOKEN GENERATOR
        document.getElementById('ownerKeyForm').onsubmit = (e) => {
            e.preventDefault();
            const token = "TOKEN-" + Math.random().toString(36).substring(2, 10).toUpperCase();
            
            db.ref('Secrets').push({
                code: token,
                role: document.getElementById('genRole').value,
                balance: document.getElementById('genBal').value,
                status: "unused",
                issuedBy: USER_ID
            }).then(() => {
                document.getElementById('tokenOutput').innerText = token;
                document.getElementById('ownerKeyResult').style.display = "block";
            });
        };

        // 📋 SYNC LOGS TABLE
        db.ref('Keys').limitToLast(6).on('value', (snap) => {
            const table = document.getElementById('logTableBody');
            table.innerHTML = "";
            snap.forEach(child => {
                const k = child.val();
                table.innerHTML += `
                    <tr>
                        <td class="text-info">${k.key}</td>
                        <td>${k.package}</td>
                        <td class="text-center">${k.devices}</td>
                        <td><span class="badge bg-success">Active</span></td>
                    </tr>`;
            });
        });

        function copyKey() {
            const val = document.getElementById('finalKey').innerText;
            navigator.clipboard.writeText(val);
            alert("Key Copied!");
        }
    </script>
</body>
</html>
