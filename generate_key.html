<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARK CORE - Key Generator Pro v2.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --neon-blue: #00f2fe;
            --bg-dark: #050a18;
            --card-bg: rgba(13, 22, 48, 0.9);
            --sidebar-bg: #040816;
            --neon-red: #ef4444;
            --neon-green: #00ff88;
            --gold: #ffcf40;
        }

        body {
            background: radial-gradient(circle at center, #0a1128 0%, #000411 100%);
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; min-height: 100vh;
            overflow-x: hidden;
        }

        /* 🌌 BACKGROUND ANIMATION */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.15; z-index: -1;
        }

        /* 👑 ELITE NAVBAR */
        .navbar {
            background: rgba(13, 22, 48, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--neon-blue);
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.3);
            padding: 15px 0;
        }
        .brand-name { font-weight: 900; letter-spacing: 4px; text-shadow: 0 0 15px var(--neon-blue); font-size: 1.6rem; }

        /* 💰 BALANCE DASHBOARD CARD */
        .balance-box {
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.1) 0%, rgba(0, 97, 255, 0.1) 100%);
            border: 1px solid var(--neon-blue);
            border-radius: 15px; padding: 10px 25px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }
        .balance-amount { font-size: 1.4rem; font-weight: 900; color: var(--neon-green); text-shadow: 0 0 10px rgba(0, 255, 136, 0.4); }

        /* 🛠️ SIDEBAR */
        .offcanvas { background-color: var(--sidebar-bg); border-left: 4px solid var(--neon-blue); width: 300px !important; }
        .menu-item { 
            padding: 18px 25px; display: flex; align-items: center; color: #8fa3cc; 
            text-decoration: none; transition: 0.4s; border-radius: 15px; margin: 10px 15px;
            border: 1px solid transparent; font-weight: 600;
        }
        .menu-item i { font-size: 1.3rem; margin-right: 15px; }
        .menu-item:hover, .menu-item.active { 
            color: var(--neon-blue); background: rgba(0, 242, 254, 0.15); 
            border-color: rgba(0, 242, 254, 0.4); box-shadow: 0 0 20px rgba(0, 242, 254, 0.1);
        }

        /* 🧬 GENERATOR CARD */
        .gen-card {
            background: var(--card-bg); border-radius: 35px; padding: 40px;
            margin-bottom: 35px; border: 1px solid rgba(0, 242, 254, 0.15);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            backdrop-filter: blur(20px); position: relative; overflow: hidden;
        }

        .form-label { color: var(--neon-blue); font-weight: 800; font-size: 0.75rem; letter-spacing: 2px; margin-bottom: 10px; }
        .form-control-custom {
            background: rgba(0,0,0,0.5); border: 1px solid rgba(0, 242, 254, 0.3);
            color: #fff; border-radius: 16px; padding: 15px; font-weight: 600;
        }
        .form-control-custom:focus {
            background: rgba(0,0,0,0.7); border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); color: #fff;
        }

        /* 🚀 ACTION BUTTON */
        .btn-ark {
            background: linear-gradient(45deg, #00f2fe, #0061ff);
            border: none; border-radius: 18px; padding: 18px;
            font-weight: 900; text-transform: uppercase; letter-spacing: 3px;
            transition: 0.4s; box-shadow: 0 8px 25px rgba(0, 242, 254, 0.4);
            position: relative; overflow: hidden;
        }
        .btn-ark:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0, 242, 254, 0.6); }
        .btn-ark:active { transform: scale(0.95); }

        /* 💎 RESULT BOX */
        .result-box {
            background: rgba(0, 242, 254, 0.08); border: 2px dashed var(--neon-blue);
            border-radius: 20px; padding: 25px; text-align: center;
            display: none; margin-top: 25px; animation: zoomIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        .key-text { 
            font-family: 'Courier New', monospace; font-size: 1.8rem; 
            color: var(--neon-blue); font-weight: 900; text-shadow: 0 0 15px var(--neon-blue);
            display: block; margin: 15px 0; letter-spacing: 2px;
        }

        /* 📜 HISTORY TABLE */
        .history-card {
            background: rgba(4, 8, 22, 0.85); border-radius: 30px; padding: 30px;
            border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        .table { color: #e6edf3; border-color: rgba(255,255,255,0.05); }
        .table thead th { border: none; color: var(--neon-blue); text-transform: uppercase; font-size: 0.7rem; padding: 20px; }
        .table tbody td { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; }

        .badge-status { border-radius: 8px; padding: 6px 12px; font-size: 0.65rem; font-weight: 900; text-transform: uppercase; }
        .bg-unused { background: rgba(0, 255, 136, 0.15); color: var(--neon-green); border: 1px solid var(--neon-green); }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <nav class="navbar sticky-top">
        <div class="container-fluid d-flex justify-content-between align-items-center px-4">
            <span class="navbar-brand brand-name text-white m-0">
                <i class="bi bi-lightning-charge-fill me-2 text-warning"></i>ARK CORE <span style="color:var(--neon-blue)">GEN</span>
            </span>
            
            <div class="balance-box d-none d-md-flex">
                <i class="bi bi-wallet2 text-info fs-4"></i>
                <div>
                    <div class="small text-muted" style="font-size: 0.6rem; letter-spacing: 1px;">AVAILABLE BALANCE</div>
                    <div class="balance-amount" id="topBalance">₹0</div>
                </div>
            </div>

            <button class="btn p-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
                <i class="bi bi-list-nested text-white" style="font-size: 2.2rem;"></i>
            </button>
        </div>
    </nav>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="sidebarMenu">
        <div class="offcanvas-header border-bottom border-secondary p-4">
            <h5 class="offcanvas-title fw-bold text-white"><i class="bi bi-cpu-fill me-2"></i> SYSTEM PANEL</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-0 pt-3">
            <a href="dashboard.html" class="menu-item"><i class="bi bi-grid-1x2-fill"></i> Main Dashboard</a>
            <a href="keys.html" class="menu-item"><i class="bi bi-key-fill"></i> License Database</a>
            <a href="generate_key.html" class="menu-item active"><i class="bi bi-plus-square-fill"></i> Key Generator</a>
            <a href="users.html" class="menu-item"><i class="bi bi-people-fill"></i> User Control</a>
            <a href="settings.html" class="menu-item"><i class="bi bi-gear-wide-connected"></i> Panel Settings</a>
            
            <div class="mt-5 p-4">
                <div class="balance-box mb-4 d-md-none">
                    <i class="bi bi-wallet2 text-info fs-4"></i>
                    <div class="balance-amount" id="sideBalance">₹0</div>
                </div>
                <a href="login.html" class="btn btn-outline-danger w-100 rounded-pill fw-bold py-3">TERMINATE SESSION</a>
            </div>
        </div>
    </div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="gen-card">
                    <div class="d-flex justify-content-between align-items-center mb-5">
                        <h4 class="m-0 fw-bold"><i class="bi bi-shield-lock-fill me-3 text-info"></i>KEY GENERATOR</h4>
                        <span class="badge bg-danger px-3 py-2" style="font-size: 0.7rem;">PLAN PRICE: ₹10,000</span>
                    </div>

                    <form id="mainGenForm">
                        <div class="mb-4">
                            <label class="form-label">TARGET GAME PACKAGE</label>
                            <input type="text" id="gamePackage" class="form-control form-control-custom" value="com.pubg.imobile" required>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label">VALIDITY DURATION</label>
                                <select id="keyDuration" class="form-select form-control-custom">
                                    <option value="1">1 Month Plan (₹10,000)</option>
                                    <option value="2">2 Months Plan (₹20,000)</option>
                                    <option value="12">1 Year Plan (₹100,000)</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="form-label">HARDWARE DEVICE LIMIT</label>
                                <select id="deviceLimit" class="form-select form-control-custom">
                                    <option value="1">Single Device (1 HWID)</option>
                                    <option value="2">Dual Device (2 HWID)</option>
                                    <option value="2">Dual Device (3 HWID)</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" id="genBtn" class="btn btn-ark w-100 mt-4">
                            <i class="bi bi-stars me-2"></i> AUTHORIZE & GENERATE KEY
                        </button>
                    </form>

                    <div id="genResultBox" class="result-box">
                        <p class="text-uppercase small fw-bold text-muted mb-1">Authorization Successful</p>
                        <span id="displayFinalKey" class="key-text">ARK-WAITING-SYNC</span>
                        <div class="d-flex gap-3 justify-content-center">
                            <button class="btn btn-info rounded-pill px-4 fw-bold" onclick="copyToClipboard()"><i class="bi bi-copy me-2"></i>COPY</button>
                            <button class="btn btn-outline-light rounded-pill px-4 fw-bold" onclick="window.location.reload()"><i class="bi bi-arrow-repeat me-2"></i>NEW</button>
                        </div>
                    </div>
                </div>

                <div class="history-card">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="m-0 fw-bold text-info"><i class="bi bi-activity me-2"></i> GENERATION LOGS</h5>
                        <button class="btn btn-sm btn-outline-secondary rounded-pill" onclick="clearHistory()">Clear History</button>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>LICENSE KEY</th>
                                    <th>PACKAGE</th>
                                    <th>EXPIRES ON</th>
                                    <th>STATUS</th>
                                </tr>
                            </thead>
                            <tbody id="logTableBody">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE INITIALIZATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyA5u_ExHIn25nKFVBK-vAYqJ7Z5zcy63nQ",
            authDomain: "arkcore-f92a6.firebaseapp.com",
            databaseURL: "https://arkcore-f92a6-default-rtdb.firebaseio.com",
            projectId: "arkcore-f92a6",
            storageBucket: "arkcore-f92a6.firebasestorage.app",
            messagingSenderId: "309961270452",
            appId: "1:309961270452:web:7847734a03c8bfe55123e1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 🆔 USER CONTEXT (Testing as Owner)
        const USER_ID = "-ONyC_2D2P8yK5rLh2_G"; // Aapki Real Firebase User ID yahan aayegi
        const PLAN_PRICE = 10000;
        let currentBalance = 0;

        // 🔄 SYNC REAL BALANCE
        db.ref('Users/' + USER_ID).on('value', (snapshot) => {
            if(snapshot.exists()) {
                currentBalance = parseInt(snapshot.val().balance || 0);
                document.getElementById('topBalance').innerText = '₹' + currentBalance.toLocaleString();
                document.getElementById('sideBalance').innerText = '₹' + currentBalance.toLocaleString();
            }
        });

        // 🎲 ARK KEY GENERATOR ENGINE
        function generateArkKey(length) {
            let result = '';
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            for (let i = 0; i < length; i++) {
                result += characters.charAt(Math.floor(Math.random() * characters.length));
            }
            return 'ARK-' + result;
        }

        // 🪄 MAIN GENERATION LOGIC WITH AUTO-DEDUCTION
        document.getElementById('mainGenForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // ❌ BALANCE CHECK
            if(currentBalance < PLAN_PRICE) {
                alert("❌ INSUFFICIENT BALANCE!\nRequired: ₹10,000\nYour Balance: ₹" + currentBalance);
                return;
            }

            const btn = document.getElementById('genBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> AUTHORIZING...';

            const pkg = document.getElementById('gamePackage').value;
            const months = parseInt(document.getElementById('keyDuration').value);
            const devLimit = document.getElementById('deviceLimit').value;
            const finalKey = generateArkKey(12);
            
            const expDate = new Date();
            expDate.setMonth(expDate.getMonth() + months);

            // 💸 DEDUCT BALANCE & SAVE KEY (Atomic Update)
            const newBalance = currentBalance - PLAN_PRICE;
            
            const updates = {};
            updates['/Users/' + USER_ID + '/balance'] = newBalance;
            updates['/Keys/' + finalKey] = {
                key: finalKey,
                package: pkg,
                expiry: expDate.toDateString(),
                deviceLimit: devLimit,
                status: "active",
                resellerId: USER_ID,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            db.ref().update(updates).then(() => {
                // Success UI
                document.getElementById('displayFinalKey').innerText = finalKey;
                document.getElementById('genResultBox').style.display = 'block';
                btn.innerHTML = '<i class="bi bi-check-circle-fill me-2"></i> KEY GENERATED';
                loadKeyLogs();
            }).catch(err => {
                alert("Database Error: " + err.message);
                btn.disabled = false;
            });
        });

        // 📋 CLIPBOARD FUNCTION
        function copyToClipboard() {
            const keyText = document.getElementById('displayFinalKey').innerText;
            navigator.clipboard.writeText(keyText);
            alert("Key Copied Successfully!");
        }

        // 📊 LOAD LOGS
        function loadKeyLogs() {
            db.ref('Keys').orderByChild('resellerId').equalTo(USER_ID).limitToLast(8).on('value', (snap) => {
                const tbody = document.getElementById('logTableBody');
                tbody.innerHTML = '';
                snap.forEach((child) => {
                    const d = child.val();
                    tbody.innerHTML += `
                        <tr>
                            <td class="fw-bold text-info">${d.key}</td>
                            <td><code class="text-white-50">${d.package}</code></td>
                            <td>${d.expiry}</td>
                            <td><span class="badge-status bg-unused">READY</span></td>
                        </tr>
                    `;
                });
            });
        }
        
        loadKeyLogs();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
