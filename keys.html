<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keys List - Arkcore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        body { background-color: #0b1121; color: white; font-family: sans-serif; }
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a254a; }
        .header-title { font-weight: bold; display: flex; align-items: center; gap: 10px; color: #00f2fe; text-transform: uppercase; }
        .active-title { padding: 20px; font-weight: bold; font-size: 1.5rem; }
        
        /* Card Style */
        .key-card {
            background-color: #121b33; border: 1px solid #1a254a;
            border-radius: 25px; padding: 20px; margin: 0 20px 20px 20px;
        }
        .key-name { color: #00f2fe; font-size: 1.5rem; font-weight: bold; word-break: break-all; }
        .created-by { background: #2a3554; padding: 3px 12px; border-radius: 10px; font-size: 0.75rem; float: right; }
        .info-row { display: flex; gap: 20px; margin: 15px 0; font-size: 1rem; }
        .status-badge { font-weight: bold; padding: 2px 8px; border-radius: 5px; text-transform: uppercase; }
        .status-active { color: #10b981; }
        .status-dead { color: #ff3131; }

        .btn-action { border-radius: 12px; padding: 10px; font-weight: bold; transition: 0.3s; width: 100%; border: 2px solid; background: transparent; }
        .btn-time { border-color: #00f2fe; color: #00f2fe; }
        .btn-off { border-color: #ff3131; color: #ff3131; }
        .btn-on { border-color: #10b981; color: #10b981; }

        /* Loader & Error */
        #loader { text-align: center; padding: 50px; color: #00f2fe; }
        #errorMsg { color: #ff3131; text-align: center; padding: 20px; display: none; }

        /* Logout Style */
        .logout-btn { color: #ff3131; cursor: pointer; font-size: 0.8rem; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title"><i class="bi bi-key-fill"></i> KEYS LIST</div>
        <div class="d-flex align-items-center gap-3">
            <a href="javascript:void(0)" onclick="logoutSession()" class="logout-btn">LOGOUT</a>
            <i class="bi bi-grid-3x3-gap-fill fs-3" style="cursor: pointer;" onclick="window.location.href='dashboard.html'"></i>
        </div>
    </div>

    <div class="active-title">ALL SUBSCRIPTIONS</div>

    <div id="loader"><div class="spinner-border text-info"></div><br>Fetching Data...</div>
    <div id="errorMsg"></div>
    <div id="keysContainer"></div>

    <script>
        // --- 🛡️ SECURITY GUARD: Bina login ke koi andar nahi aayega ---
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = "login.html";
        }

        function logoutSession() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('activeUser');
            window.location.href = "login.html";
        }
        // ----------------------------------------------------------

        // FIREBASE CONFIG (Aapka Original Config)
        const firebaseConfig = {
            apiKey: "AIzaSyA5u_ExHIn25nKFVBK-vAYqJ7Z5zcy63nQ",
            authDomain: "arkcore-f92a6.firebaseapp.com",
            databaseURL: "https://arkcore-f92a6-default-rtdb.firebaseio.com",
            projectId: "arkcore-f92a6",
            storageBucket: "arkcore-f92a6.firebasestorage.app",
            messagingSenderId: "309961270452",
            appId: "1:309961270452:web:7847734a03c8bfe55123e1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Loading Data (Aapka Original Logic)
        db.ref('keys').on('value', (snapshot) => {
            const container = document.getElementById('keysContainer');
            const loader = document.getElementById('loader');
            const errorMsg = document.getElementById('errorMsg');
            
            loader.style.display = "none";
            container.innerHTML = "";

            if (!snapshot.exists()) {
                errorMsg.innerText = "No Keys Found in Database! Pehle 'Generate Key' page se key banaiye.";
                errorMsg.style.display = "block";
                return;
            }

            errorMsg.style.display = "none";
            const data = snapshot.val();

            Object.keys(data).forEach(id => {
                const keyObj = data[id];
                const keyStatus = (keyObj.status || "UNUSED").toUpperCase();
                const isLive = (keyStatus === "ACTIVE" || keyStatus === "UNUSED");

                container.innerHTML += `
                    <div class="key-card">
                        <span class="created-by">By: ${keyObj.generatedBy || 'Aditya'}</span>
                        <div class="key-name">${keyObj.key}</div>
                        <div class="info-row">
                            <span>Status: <b class="${isLive ? 'status-active' : 'status-dead'}">${keyStatus}</b></span>
                            <span>Plan: <b>${keyObj.duration || 'N/A'}</b></span>
                        </div>
                        <div class="row g-2">
                            <div class="col-6">
                                <button class="btn-action btn-time"><i class="bi bi-clock"></i> +TIME</button>
                            </div>
                            <div class="col-6">
                                <button class="btn-action ${isLive ? 'btn-off' : 'btn-on'}" onclick="changeStatus('${id}', '${keyStatus}')">
                                    <i class="bi bi-power"></i> ${isLive ? 'DISABLE' : 'ENABLE'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }, (error) => {
            document.getElementById('loader').style.display = "none";
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.style.display = "block";
            errorMsg.innerHTML = "<b>FIREBASE ERROR:</b> " + error.message + "<br><br>Check your Database Rules!";
        });

        function changeStatus(id, current) {
            const nextStatus = (current === "ACTIVE" || current === "UNUSED") ? "DISABLED" : "ACTIVE";
            db.ref('keys/' + id).update({ status: nextStatus });
        }
    </script>

</body>
</html>
