<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Keys Manager - Arkcore Elite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --neon-blue: #00f2fe;
            --bg-dark: #050a18;
            --card-bg: #0d1630;
            --neon-red: #ff3131;
            --neon-green: #10b981;
        }

        body { 
            background: radial-gradient(circle at top, #0a1128 0%, #000411 100%); 
            color: white; font-family: 'Segoe UI', sans-serif; min-height: 100vh;
            padding-bottom: 50px;
        }

        /* 👑 Premium Header */
        .header { 
            background: rgba(13, 22, 48, 0.9); backdrop-filter: blur(15px);
            padding: 18px 25px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--neon-blue); sticky-top; z-index: 1000;
            box-shadow: 0 5px 20px rgba(0, 242, 254, 0.2);
        }
        .header-title { font-weight: 900; letter-spacing: 2px; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        /* 🔍 Search Bar */
        .search-container { padding: 20px; }
        .search-input {
            background: rgba(255,255,255,0.05); border: 1px solid var(--neon-blue);
            border-radius: 50px; padding: 12px 25px; color: white; width: 100%;
            transition: 0.3s;
        }
        .search-input:focus { box-shadow: 0 0 15px var(--neon-blue); outline: none; background: rgba(0,0,0,0.4); }

        .active-title { padding: 0 25px 15px 25px; font-weight: 800; font-size: 1.2rem; color: #8fa3cc; text-transform: uppercase; }

        /* 📱 Key Card */
        .key-card {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 25px; padding: 22px; margin: 0 20px 20px 20px;
            position: relative; transition: 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .key-card:hover { border-color: var(--neon-blue); transform: translateY(-3px); }
        
        .key-name { color: var(--neon-blue); font-size: 1.4rem; font-weight: 800; word-break: break-all; font-family: monospace; }
        .created-by { background: rgba(0, 242, 254, 0.1); color: var(--neon-blue); padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: bold; }
        
        .info-row { display: flex; justify-content: space-between; margin: 15px 0; font-size: 0.9rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }
        
        .status-badge { font-weight: bold; padding: 5px 12px; border-radius: 8px; font-size: 0.75rem; border: 1px solid; }
        .status-active { color: var(--neon-green); border-color: var(--neon-green); background: rgba(16, 185, 129, 0.1); }
        .status-dead { color: var(--neon-red); border-color: var(--neon-red); background: rgba(255, 49, 49, 0.1); }

        /* 🔘 Action Buttons */
        .btn-action { 
            border-radius: 12px; padding: 12px; font-weight: 800; transition: 0.3s; 
            width: 100%; border: 2px solid; background: transparent; font-size: 0.8rem;
        }
        .btn-time { border-color: var(--neon-blue); color: var(--neon-blue); }
        .btn-time:hover { background: var(--neon-blue); color: #000; }
        
        .btn-off { border-color: var(--neon-red); color: var(--neon-red); }
        .btn-off:hover { background: var(--neon-red); color: #fff; }
        
        .btn-on { border-color: var(--neon-green); color: var(--neon-green); }
        .btn-on:hover { background: var(--neon-green); color: #000; }

        .btn-del { border-color: #666; color: #999; margin-top: 10px; }
        .btn-del:hover { border-color: #fff; color: #fff; background: rgba(255,255,255,0.1); }

        /* 🌀 Loader */
        #loader { text-align: center; padding: 100px 0; color: var(--neon-blue); }
        #errorMsg { color: var(--neon-red); text-align: center; padding: 30px; display: none; font-weight: bold; }

        .stats-bar { display: flex; padding: 0 20px 20px 20px; gap: 10px; overflow-x: auto; }
        .stat-item { background: rgba(255,255,255,0.03); padding: 10px 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); white-space: nowrap; }
        .stat-item b { color: var(--neon-blue); }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title"><i class="bi bi-shield-lock-fill"></i> ARK CORE ADMIN</div>
        <div class="d-flex align-items-center gap-3">
            <i class="bi bi-plus-circle-fill fs-3 text-info" onclick="window.location.href='generate_key.html'"></i>
            <i class="bi bi-grid-3x3-gap-fill fs-3" style="cursor: pointer;" onclick="window.location.href='dashboard.html'"></i>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Search Key or Package Name..." onkeyup="filterKeys()">
    </div>

    <div class="stats-bar" id="statsBar">
        <div class="stat-item">Total: <b id="countTotal">0</b></div>
        <div class="stat-item">Active: <b id="countActive" style="color: var(--neon-green);">0</b></div>
        <div class="stat-item">Blocked: <b id="countBlocked" style="color: var(--neon-red);">0</b></div>
    </div>

    <div class="active-title">Live Subscription Database</div>

    <div id="loader">
        <div class="spinner-grow text-info"></div>
        <div class="mt-3 fw-bold">SYNCING FIREBASE...</div>
    </div>

    <div id="errorMsg"></div>
    <div id="keysContainer"></div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyA5u_ExHIn25nKFVBK-vAYqJ7Z5zcy63nQ",
            authDomain: "arkcore-f92a6.firebaseapp.com",
            databaseURL: "https://arkcore-f92a6-default-rtdb.firebaseio.com",
            projectId: "arkcore-f92a6",
            storageBucket: "arkcore-f92a6.firebasestorage.app",
            messagingSenderId: "309961270452",
            appId: "1:309961270452:web:7847734a03c8bfe55123e1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 🔊 Professional Female Voice Function
        function playVoice(msg) {
            const speech = new SpeechSynthesisUtterance(msg);
            speech.lang = 'hi-IN';
            speech.pitch = 1.3;
            window.speechSynthesis.speak(speech);
        }

        // Fetching Data with Advanced Stats
        db.ref('Keys').on('value', (snapshot) => {
            const container = document.getElementById('keysContainer');
            const loader = document.getElementById('loader');
            const errorMsg = document.getElementById('errorMsg');
            
            loader.style.display = "none";
            container.innerHTML = "";

            if (!snapshot.exists()) {
                errorMsg.innerText = "No Keys Found! Generator page se key banaiye.";
                errorMsg.style.display = "block";
                return;
            }

            errorMsg.style.display = "none";
            const data = snapshot.val();
            let activeCount = 0;
            let blockedCount = 0;
            let totalCount = 0;

            Object.keys(data).reverse().forEach(id => {
                totalCount++;
                const keyObj = data[id];
                const keyStatus = (keyObj.status || "UNUSED").toUpperCase();
                const isLive = (keyStatus === "ACTIVE" || keyStatus === "UNUSED");
                
                if(isLive) activeCount++; else blockedCount++;

                container.innerHTML += `
                    <div class="key-card" data-key="${keyObj.key.toLowerCase()} ${keyObj.package ? keyObj.package.toLowerCase() : ''}">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="key-name">${keyObj.key}</div>
                            <span class="created-by">👤 ${keyObj.generatedBy || 'Admin'}</span>
                        </div>
                        
                        <div style="font-size: 0.75rem; color: #8fa3cc; margin-top: 5px;">
                            <i class="bi bi-box-seam"></i> Package: <b>${keyObj.package || 'Global'}</b>
                        </div>

                        <div class="info-row">
                            <span>Status: <b class="status-badge ${isLive ? 'status-active' : 'status-dead'}">${keyStatus}</b></span>
                            <span>Exp: <b class="text-info">${keyObj.expiry || 'Life-Time'}</b></span>
                        </div>

                        <div class="row g-2">
                            <div class="col-6">
                                <button class="btn-action btn-time" onclick="addTime('${id}')"><i class="bi bi-clock-history"></i> EXTEND</button>
                            </div>
                            <div class="col-6">
                                <button class="btn-action ${isLive ? 'btn-off' : 'btn-on'}" onclick="changeStatus('${id}', '${keyStatus}')">
                                    <i class="bi bi-power"></i> ${isLive ? 'BLOCK CORE' : 'UNBLOCK'}
                                </button>
                            </div>
                            <div class="col-12">
                                <button class="btn-action btn-del" onclick="deleteKey('${id}', '${keyObj.key}')">
                                    <i class="bi bi-trash3"></i> PERMANENT DELETE
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });

            // Update Stats
            document.getElementById('countTotal').innerText = totalCount;
            document.getElementById('countActive').innerText = activeCount;
            document.getElementById('countBlocked').innerText = blockedCount;
        });

        // 🔎 Real-time Filter
        function filterKeys() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('key-card');
            for (let card of cards) {
                let content = card.getAttribute('data-key');
                card.style.display = content.includes(input) ? "block" : "none";
            }
        }

        // ⚡ Status Toggle
        function changeStatus(id, current) {
            const nextStatus = (current === "ACTIVE" || current === "UNUSED") ? "BLOCKED" : "ACTIVE";
            db.ref('Keys/' + id).update({ status: nextStatus }).then(() => {
                playVoice(`Key status updated to ${nextStatus}`);
            });
        }

        // ⏰ Time Extender Logic
        function addTime(id) {
            const days = prompt("How many more days to add?", "7");
            if (days) {
                alert("Successfully added " + days + " days to key!");
                // Yahan aap Expiry date update karne ka logic add kar sakte hain
            }
        }

        // 🗑️ Delete Function
        function deleteKey(id, keyName) {
            if(confirm("Are you sure you want to delete " + keyName + "? This cannot be undone!")) {
                db.ref('Keys/' + id).remove().then(() => {
                    playVoice("Key deleted successfully");
                });
            }
        }
    </script>
</body>
</html>
